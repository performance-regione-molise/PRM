<script>

window._SUBS = [];
window._saveSubs = function(s){ window._SUBS = s; try{localStorage.setItem("ppo8",JSON.stringify(s))}catch(e){} };
window._loadSubs = function(){ try{return JSON.parse(localStorage.getItem("ppo8")||"[]")}catch(e){return[]} };

window._mkPDF = function(en){
  console.log("_mkPDF called for:", en.serviceCode, en.type);
  var doc = new window.jspdf.jsPDF({orientation:"landscape",unit:"mm",format:"a4"});
  var W=297,H=210,mx=8,mxR=W-8,cW=mxR-mx;
  var d=en.data, area=en.areaName, sN=en.serviceName, sC=en.serviceCode;
  var ck = function(a,v){ return (a||[]).indexOf(v)>=0 ? "[X]" : "[ ]"; };
  var ts={fontSize:7,cellPadding:2.2,lineColor:[170,170,170],lineWidth:0.2,textColor:[23,50,77]};
  var hd=[230,236,244], yc=[255,249,225];
  var isStr = en.type==="strategic";

  // Header
  doc.setFillColor(0,51,102); doc.rect(0,0,W,20,"F");
  try{ doc.addImage(window.LOGO_MD,"PNG",6,2,16,16); }catch(e){}
  doc.setTextColor(255,255,255); doc.setFontSize(11); doc.setFont(undefined,"bold");
  doc.text("REGIONE MOLISE",25,8);
  doc.setFontSize(7); doc.setFont(undefined,"normal");
  doc.text("Servizio Supporto Direttore Generale della Giunta Regionale",25,13);
  doc.text("Piano della Performance Organizzativa 2025-2027 | DGR n. 149/2025",25,17);
  doc.text(new Date(en.timestamp).toLocaleString("it-IT"),mxR,8,{align:"right"});
  doc.text(sC+" - "+sN,mxR,14,{align:"right"});
  var y=24;
  var title = isStr ? "SCHEDA OBIETTIVO STRATEGICO" : "SCHEDA OBIETTIVO OPERATIVO";

  doc.setFillColor(0,51,102); doc.setTextColor(255); doc.setFontSize(10); doc.setFont(undefined,"bold");
  doc.rect(mx,y,cW,7,"F"); doc.text(title,mx+3,y+5); y+=9;

  if(isStr){
    doc.autoTable({startY:y,margin:{left:mx,right:8},body:[
      [{content:"CODICE OB. STRATEGICO",styles:{fontStyle:"bold",fillColor:hd,cellWidth:50}},{content:d.codice||"-",colSpan:2},{content:"peso %",styles:{fontStyle:"bold",fillColor:hd,cellWidth:16}},{content:(d.peso||"-")+"%"}],
      [{content:"NOME/DESCRIZIONE\n(max. 40 parole)",styles:{fontStyle:"bold",fillColor:hd}},{content:d.nome||"-",colSpan:3}],
      [{content:"AREA ORGANIZZATIVA",styles:{fontStyle:"bold",fillColor:hd}},{content:area,colSpan:3}],
      [{content:"SERVIZIO",styles:{fontStyle:"bold",fillColor:hd}},{content:sN,colSpan:3}]
    ],theme:"grid",styles:ts,columnStyles:{0:{cellWidth:50}}}); y=doc.lastAutoTable.finalY+1;

// Called by archive buttons via data-id attribute
window._archivePDF = function(id){
  console.log("_archivePDF id:", id);
  var found = null;
  for(var i=0; i<window._SUBS.length; i++){
    if(window._SUBS[i].id === id){ found = window._SUBS[i]; break; }
  }
  if(!found){ alert("Scheda non trovata: "+id); return; }
  try{ window._mkPDF(found); }catch(e){ console.error("PDF Error:",e); alert("Errore PDF: "+e.message); }
};
window._archiveXLS = function(id){
  console.log("_archiveXLS id:", id);
  var found = null;
  for(var i=0; i<window._SUBS.length; i++){
    if(window._SUBS[i].id === id){ found = window._SUBS[i]; break; }
  }
  if(!found){ alert("Scheda non trovata: "+id); return; }
  try{ window._mkXLS(found); }catch(e){ console.error("XLS Error:",e); alert("Errore XLS: "+e.message); }
};
window._archiveDel = function(id){
  if(!confirm("Eliminare questa scheda?")) return;
  window._SUBS = window._SUBS.filter(function(s){ return s.id !== id; });
  window._saveSubs(window._SUBS);
  // Force React re-render by dispatching custom event
  window.dispatchEvent(new Event("subsChanged"));
};
window._exportAll = function(){
  var subs = window._SUBS;
  if(!subs.length){ alert("Nessun dato"); return; }

document.addEventListener("click", function(evt){
  var btn = evt.target;
  if(!btn.dataset || !btn.dataset.act || !btn.dataset.eid) return;
  var act = btn.dataset.act;
  var eid = btn.dataset.eid;
  console.log("Archive click:", act, eid);
  if(act === "pdf") window._archivePDF(eid);
  else if(act === "xls") window._archiveXLS(eid);
  else if(act === "del") window._archiveDel(eid);
});

// Dashboard BI completa
function Dash(p){
  var s=p.subs;
  var nS=s.filter(function(x){return x.type==="strategic"}).length;
  var nO=s.filter(function(x){return x.type==="operative"}).length;
  var strs=s.filter(function(x){return x.type==="strategic"});
  var oprs=s.filter(function(x){return x.type==="operative"});

  // Area counts
  var ac={};s.forEach(function(x){ac[x.areaCode]=(ac[x.areaCode]||0)+1});
  // Service counts
  var sc={};s.forEach(function(x){sc[x.serviceCode]=(sc[x.serviceCode]||0)+1});
  var allSvc=[];AREAS.forEach(function(a){a.svcs.forEach(function(x){allSvc.push(x.code)})});
  var covSet={};s.forEach(function(x){covSet[x.serviceCode]=true});
  var cvp=allSvc.length?Math.round(Object.keys(covSet).length/allSvc.length*100):0;

  // Impatto coverage (strategic)
  var impC={};IMP.forEach(function(i){impC[i]=0});
  strs.forEach(function(x){(x.data.impatto||[]).forEach(function(i){if(impC[i]!==undefined)impC[i]++})});
  // Efficacia
  var effC={};EFF.forEach(function(i){effC[i]=0});
  strs.forEach(function(x){(x.data.efficacia||[]).forEach(function(i){if(effC[i]!==undefined)effC[i]++})});
  // Efficienza
  var efzC={};EFZ.forEach(function(i){efzC[i]=0});
  strs.forEach(function(x){(x.data.efficienza||[]).forEach(function(i){if(efzC[i]!==undefined)efzC[i]++})});
  // Salute
  var salC={};SAL.forEach(function(i){salC[i]=0});
  strs.forEach(function(x){(x.data.salute||[]).forEach(function(i){if(salC[i]!==undefined)salC[i]++})});
  // Trasversali
  var trvC={};TRV.forEach(function(t){trvC[t]=0});
  strs.forEach(function(x){(x.data.trasversali||[]).forEach(function(t){if(trvC[t]!==undefined)trvC[t]++})});
  // Stakeholders (all)
  var stkC={};STK.forEach(function(t){stkC[t]=0});
  s.forEach(function(x){(x.data.stakeholders||[]).forEach(function(t){if(stkC[t]!==undefined)stkC[t]++})});
  // DEFR
  var defrSI=strs.filter(function(x){return x.data.defr==="SI"}).length;
  var defrNO=strs.filter(function(x){return x.data.defr==="NO"}).length;
  // Rischio (operative)
  var rNo=0,rAlto=0,rMB=0,rND=0;
  oprs.forEach(function(x){var r=x.data.rischio;if(r==="no")rNo++;else if(r==="alto")rAlto++;else if(r==="medio_basso")rMB++;else rND++});
  // Peso medio
  var pesoS=0,pesoO=0,cntPS=0,cntPO=0;
  strs.forEach(function(x){var p=parseFloat(x.data.peso);if(!isNaN(p)){pesoS+=p;cntPS++}});
  oprs.forEach(function(x){var p=parseFloat(x.data.peso);if(!isNaN(p)){pesoO+=p;cntPO++}});
  var avgPS=cntPS?Math.round(pesoS/cntPS):0;
  var avgPO=cntPO?Math.round(pesoO/cntPO):0;

  // Helper for bar row
  var barRow=function(label,val,max,color){
    var pct=max>0?Math.round(val/max*100):0;
    return h("div",{key:label,style:{display:"flex",alignItems:"center",gap:8,marginBottom:6}},
      h("div",{style:{width:180,fontSize:12,color:"#17324d",flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},label),
      h("div",{style:{flex:1,background:"#e8ecf1",borderRadius:3,height:18,position:"relative"}},
        h("div",{style:{width:pct+"%",background:color,borderRadius:3,height:18,minWidth:val>0?2:0}}),
        h("span",{style:{position:"absolute",right:6,top:1,fontSize:11,fontWeight:600,color:"#17324d"}},val)
      )
    );
  };

  // Helper for KPI card
  var kpi=function(val,label,color){
    return h("div",{className:"kc"},
      h("div",{style:{fontSize:28,fontWeight:700,color:color||"#003366"}},val),
      h("div",{style:{fontSize:10,color:"#5c6f82",fontWeight:600,textTransform:"uppercase",letterSpacing:".04em"}},label)
    );
  };

  // Section header
  var secH=function(title,icon){
    return h("div",{style:{fontWeight:700,fontSize:14,color:"#003366",marginBottom:10,paddingBottom:6,borderBottom:"2px solid #003366",display:"flex",alignItems:"center",gap:6}},icon||null,title);
  };

  // Table helper
  var tbl=function(headers,rows){
    return h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:12}},
      h("thead",null,h("tr",null,headers.map(function(hdr,i){
        return h("th",{key:i,style:{padding:"6px 8px",background:"#003366",color:"#fff",textAlign:"left",fontSize:11,fontWeight:600}},hdr);
      }))),
      h("tbody",null,rows.map(function(row,ri){
        return h("tr",{key:ri,style:{background:ri%2===0?"#fff":"#f8f9fa"}},row.map(function(cell,ci){
          return h("td",{key:ci,style:{padding:"5px 8px",borderBottom:"1px solid #e8ecf1",fontSize:12}},cell);
        }));
      }))
    );
  };

  var maxImp=Math.max.apply(null,IMP.map(function(i){return impC[i]}));
  var maxTrv=Math.max.apply(null,TRV.map(function(t){return trvC[t]}));
  var maxStk=Math.max.apply(null,STK.map(function(t){return stkC[t]}));

  return h("div",null,
    // ── KPI ROW ──
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:20}},
      kpi(s.length,"Schede Totali","#003366"),
      kpi(nS,"Ob. Strategici","#0066cc"),
      kpi(nO,"Ob. Operativi","#008758"),
      kpi(Object.keys(covSet).length+"/"+allSvc.length,"Servizi Coperti","#b8860b"),
      kpi(cvp+"%","Copertura",cvp>=75?"#008758":"#d9364f"),
      kpi(avgPS+"%/"+avgPO+"%","Peso Medio STR/OPR","#5c6f82")
    ),

    // ── ROW 1: Area + Tipo + DEFR ──
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:14}},
      h("div",{className:"cd",style:{padding:14}},
        secH("Schede per Area"),
        Object.keys(ac).map(function(k){return barRow(k,ac[k],s.length,"#003366")})
      ),
      h("div",{className:"cd",style:{padding:14}},
        secH("Distribuzione per Tipo"),
        h("div",{style:{display:"flex",gap:20,justifyContent:"center",padding:"20px 0"}},
          h("div",{style:{textAlign:"center"}},
            h("div",{style:{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#0066cc,#004d99)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 8px"}},
              h("span",{style:{color:"#fff",fontSize:24,fontWeight:700}},nS)
            ),
            h("div",{style:{fontSize:12,fontWeight:600,color:"#0066cc"}},"Strategici")
          ),
          h("div",{style:{textAlign:"center"}},
            h("div",{style:{width:80,height:80,borderRadius:"50%",background:"linear-gradient(135deg,#008758,#006b45)",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 8px"}},
              h("span",{style:{color:"#fff",fontSize:24,fontWeight:700}},nO)
            ),
            h("div",{style:{fontSize:12,fontWeight:600,color:"#008758"}},"Operativi")
          )
        )
      ),
      h("div",{className:"cd",style:{padding:14}},
        secH("DEFR (Strategici)"),
        nS>0?h("div",null,
          barRow("[X] Previsto",defrSI,nS,"#008758"),
          barRow("[ ] Non previsto",defrNO,nS,"#5c6f82"),
          barRow("N.D.",nS-defrSI-defrNO,nS,"#d9dadb")
        ):h("div",{style:{color:"#5c6f82",textAlign:"center",padding:20}},"Nessun obiettivo strategico")
      )
    ),

    // ── ROW 2: Impatto + Efficacia/Efficienza + Salute ──
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:14}},
      h("div",{className:"cd",style:{padding:14}},
        secH("Impatto (Strategici)"),
        IMP.map(function(i){return barRow(i.replace("Impatto ",""),impC[i],maxImp||1,"#0066cc")})
      ),
      h("div",{className:"cd",style:{padding:14}},
        secH("Efficacia / Efficienza"),
        h("div",{style:{fontSize:11,fontWeight:600,color:"#5c6f82",marginBottom:4}},"EFFICACIA"),
        EFF.map(function(i){return barRow(i,effC[i],nS||1,"#008758")}),
        h("div",{style:{fontSize:11,fontWeight:600,color:"#5c6f82",marginBottom:4,marginTop:8}},"EFFICIENZA"),
        EFZ.map(function(i){return barRow(i,efzC[i],nS||1,"#b8860b")})
      ),
      h("div",{className:"cd",style:{padding:14}},
        secH("Salute Amministrazione"),
        SAL.map(function(i){return barRow(i,salC[i],nS||1,"#9b59b6")}),
        h("div",{style:{marginTop:16}}),
        secH("Rischio Corruzione (Operativi)"),
        nO>0?h("div",null,
          barRow("Nessun rischio",rNo,nO,"#008758"),
          barRow("Rischio alto",rAlto,nO,"#d9364f"),
          barRow("Rischio medio/basso",rMB,nO,"#e67e22"),
          barRow("Non indicato",rND,nO,"#d9dadb")
        ):h("div",{style:{color:"#5c6f82",fontSize:12}},"Nessun operativo")
      )
    ),

    // ── ROW 3: Trasversali + Stakeholders ──
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}},
      h("div",{className:"cd",style:{padding:14}},
        secH("Obiettivi Trasversali (Strategici)"),
        TRV.map(function(t){return barRow(t,trvC[t],maxTrv||1,"#b8860b")})
      ),
      h("div",{className:"cd",style:{padding:14}},
        secH("Stakeholders Coinvolti"),
        STK.map(function(t){return barRow(t,stkC[t],maxStk||1,"#003366")})
      )
    ),

    // ── ROW 4: Dettaglio servizi ──
    h("div",{className:"cd",style:{padding:14,marginBottom:14}},
      secH("Dettaglio per Servizio"),
      tbl(["Servizio","Tipo","Codice Ob.","Descrizione","Peso %","Indicatore","UM","Deadline"],
        s.map(function(e){
          return [
            e.serviceCode+" - "+e.serviceName,
            e.type==="strategic"?"STR":"OPR",
            e.data.codice||"-",
            (e.data.nome||"-").substring(0,60),
            (e.data.peso||"-")+"%",
            e.data.ind||"-",
            e.data.um||"-",
            e.type==="strategic"?(e.data.deadlineType==="periodo"?e.data.deadlinePeriodo:e.data.deadlineType||"-"):(e.data.deadline||"-")
          ];
        })
      )
    ),

    // ── ROW 5: Indicatori dettagliati strategici ──
    nS>0?h("div",{className:"cd",style:{padding:14,marginBottom:14}},
      secH("Indicatori Obiettivi Strategici"),
      tbl(["Servizio","Codice","Indicatore","UM","Baseline","Fonte","Ris. 2025","Ris. 2026","Ris. 2027"],
        strs.map(function(e){
          var d=e.data;
          return [
            e.serviceCode,d.codice||"-",d.ind||"-",d.um||"-",d.baseline||"-",d.fonte||"-",
            d.ris2025||"-",d.ris2026||"-",d.ris2027||"-"
          ];
        })
      )
    ):null,

    // ── ROW 6: Indicatori dettagliati operativi ──
    nO>0?h("div",{className:"cd",style:{padding:14,marginBottom:14}},
      secH("Indicatori Obiettivi Operativi"),
      tbl(["Servizio","Codice","Strat. Rif.","Indicatore","UM","Baseline","Fonte","Risultato","Rischio"],
        oprs.map(function(e){
          var d=e.data;
          return [
            e.serviceCode,d.codice||"-",d.stratRif||"-",d.ind||"-",d.um||"-",d.baseline||"-",d.fonte||"-",
            d.risultato||"-",d.rischio||"-"
          ];
        })
      )
    ):null,

    // ── ROW 7: Timeline ──
    h("div",{className:"cd",style:{padding:14}},
      secH("Cronologia Compilazioni"),
      tbl(["Data","Tipo","Servizio","Codice","Descrizione","Compilatore"],
        s.slice().reverse().map(function(e){
          return [
            new Date(e.timestamp).toLocaleString("it-IT"),
            e.type==="strategic"?"STR":"OPR",

            e.data.codice||"-",

            "Servizio "+e.serviceCode

  );
}

// ═══ MAIN APP ═══
function App(){
  var vs=useState("select");var v=vs[0];var setV=vs[1];
  var ss=useState(null);var svc=ss[0];var setSvc=ss[1];
  var fs=useState("strategic");var ft=fs[0];var setFt=fs[1];
  var ds=useState(eS());var sD=ds[0];var setSD=ds[1];
  var os=useState(eO());var oD=os[0];var setOD=os[1];
  var bs=useState(function(){var d=window._loadSubs();window._SUBS=d;return d});var subs=bs[0];var setSubs=bs[1];
  var ts=useState(null);var toast=ts[0];var setToast=ts[1];
  var xs=useState("");var search=xs[0];var setSearch=xs[1];
  var ls=useState(false);var logged=ls[0];var setLogged=ls[1];
  var us=useState("");var lU=us[0];var setLU=us[1];
  var ps=useState("");var lP=ps[0];var setLP=ps[1];
  var es=useState("");var lE=es[0];var setLE=es[1];
  var as=useState("dashboard");var aTab=as[0];var setATab=as[1];

  // Listen for subsChanged events (from global delete function)
  useEffect(function(){
    var handler=function(){setSubs(window._SUBS.slice())};
    window.addEventListener("subsChanged",handler);
    return function(){window.removeEventListener("subsChanged",handler)};
  },[]);

  var flash=function(m,t){setToast({m:m,t:t||"ok"});setTimeout(function(){setToast(null)},3000)};

  var findArea=function(code){
    for(var i=0;i<AREAS.length;i++){for(var j=0;j<AREAS[i].svcs.length;j++){if(AREAS[i].svcs[j].code===code)return AREAS[i]}}return null;
  };

  var selSvc=function(s){setSvc(s);setSD(eS());setOD(eO());setFt("strategic");setV("form");window.scrollTo(0,0)};

  var submit=function(){
    var d = ft==="strategic" ? sD : oD;
    if(!hasFilled(d)){flash("Compila Codice e Descrizione","err");return}
    var a=findArea(svc.code);
    var en={id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),timestamp:new Date().toISOString(),serviceCode:svc.code,serviceName:svc.name,areaCode:a?a.code:"",areaName:a?a.name:"",type:ft,data:Object.assign({},d)};
    var up=subs.concat([en]);
    setSubs(up);window._saveSubs(up);
    // Download with staggered timing
    try{window._mkPDF(en)}catch(e){console.error(e);alert("Errore PDF: "+e.message)}
    setTimeout(function(){try{window._mkXLS(en)}catch(e){console.error(e);alert("Errore XLS: "+e.message)}},1200);
    flash("Scheda "+(ft==="strategic"?"STRATEGICA":"OPERATIVA")+" salvata! PDF + XLS in download...");
    if(ft==="strategic"){setSD(eS())}else{setOD(eO())}
    window.scrollTo(0,0);
  };

  var doLogin=function(){if(lU==="admin"&&lP==="Molise2025!"){setLogged(true);setLE("");setV("archive")}else setLE("Credenziali non valide")};

  var filtered=search.trim()?AREAS.map(function(a){return Object.assign({},a,{svcs:a.svcs.filter(function(s){return s.code.toLowerCase().indexOf(search.toLowerCase())>=0||s.name.toLowerCase().indexOf(search.toLowerCase())>=0})})}).filter(function(a){return a.svcs.length>0}):AREAS;

  var nS=subs.filter(function(x){return x.type==="strategic"}).length;
  var nO=subs.filter(function(x){return x.type==="operative"}).length;

  // Build archive list with NATIVE onclick (not React onClick)
  // This is the key fix - we use dangerouslySetInnerHTML for archive buttons
  var archiveListHTML = "";
  if(subs.length){
    var rev = subs.slice().reverse();
    for(var i=0; i<rev.length; i++){
      var e = rev[i];
      var typeLabel = e.type==="strategic" ? "STR" : "OPR";
      var typeBg = e.type==="strategic" ? "#e8f0fe" : "#e6f4ed";
      var typeColor = e.type==="strategic" ? "#0066cc" : "#008758";
      archiveListHTML += '<div class="cd" style="padding:11px 14px;margin-bottom:7px">';
      archiveListHTML += '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">';
      archiveListHTML += '<div style="flex:1;min-width:0">';
      archiveListHTML += '<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;flex-wrap:wrap">';
      archiveListHTML += '<span style="padding:2px 6px;border-radius:3px;font-size:11px;font-weight:700;background:'+typeBg+';color:'+typeColor+'">'+typeLabel+'</span>';
      archiveListHTML += '<span style="color:#003366;font-weight:700;font-size:12px;font-family:monospace">'+e.serviceCode+'</span>';
      archiveListHTML += '<span style="color:#5c6f82;font-size:11px">'+new Date(e.timestamp).toLocaleString("it-IT")+'</span>';
      archiveListHTML += '</div>';
      archiveListHTML += '<div style="color:#17324d;font-weight:600;font-size:13px">'+e.serviceName+'</div>';
      if(e.data.nome) archiveListHTML += '<div style="color:#5c6f82;font-size:12px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(e.data.codice?e.data.codice+' - ':'')+e.data.nome+'</div>';
      archiveListHTML += '</div>';
      archiveListHTML += '<div style="display:flex;gap:3px;flex-shrink:0">';
      archiveListHTML += '<button data-act="pdf" data-eid="'+e.id+'" style="padding:4px 10px;font-size:11px;font-weight:600;background:#fff;color:#0066cc;border:1.5px solid #0066cc;border-radius:4px;cursor:pointer">PDF</button>';
      archiveListHTML += '<button data-act="xls" data-eid="'+e.id+'" style="padding:4px 10px;font-size:11px;font-weight:600;background:#fff;color:#008758;border:1.5px solid #008758;border-radius:4px;cursor:pointer">XLS</button>';
      archiveListHTML += '<button data-act="del" data-eid="'+e.id+'" style="padding:4px 10px;font-size:11px;background:none;border:1px solid #e8ecf1;border-radius:3px;color:#b0bec5;cursor:pointer">x</button>';
      archiveListHTML += '</div></div></div>';
    }
  }

  return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column"}},
    // Toast
    toast?h("div",{style:{position:"fixed",top:14,right:14,zIndex:9999,padding:"12px 22px",borderRadius:4,background:toast.t==="err"?"#d9364f":"#008758",color:"#fff",fontWeight:600,fontSize:14,boxShadow:"0 6px 20px rgba(0,0,0,.2)"}},toast.m):null,

    // Header
    h("header",{style:{background:"#003366",borderBottom:"3px solid #c8a84c",position:"sticky",top:0,zIndex:100}},
      h("div",{style:{maxWidth:1100,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",justifyContent:"space-between",height:62,flexWrap:"wrap",gap:6}},
        h("div",{style:{display:"flex",alignItems:"center",gap:10}},
          h("img",{src:window.LOGO_SM,style:{width:40,height:40,borderRadius:3}}),
          h("div",null,
            h("div",{style:{color:"#c8a84c",fontWeight:700,fontSize:14}},"REGIONE MOLISE"),
            h("div",{style:{color:"rgba(255,255,255,.65)",fontSize:11}},"Servizio Supporto Direttore Generale della Giunta Regionale"),
            h("div",{style:{color:"rgba(255,255,255,.35)",fontSize:10}},"Piano Performance Organizzativa 2025-2027")
          )
        ),
        h("nav",{style:{display:"flex",gap:4,alignItems:"center"}},
          h("button",{onClick:function(){setV("select")},style:{padding:"7px 14px",borderRadius:3,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:v==="select"||v==="form"?"rgba(200,168,76,.2)":"transparent",color:v==="select"||v==="form"?"#c8a84c":"rgba(255,255,255,.5)"}},"Compilazione"),
          h("button",{onClick:function(){if(logged)setV("archive");else setV("login")},style:{padding:"7px 14px",borderRadius:3,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:v==="archive"||v==="login"?"rgba(200,168,76,.2)":"transparent",color:v==="archive"||v==="login"?"#c8a84c":"rgba(255,255,255,.5)"}},logged?"Archivio ("+subs.length+")":"Archivio"),
          logged?h("button",{onClick:function(){setLogged(false);setV("select")},style:{padding:"5px 10px",borderRadius:3,border:"1px solid rgba(255,255,255,.2)",cursor:"pointer",fontSize:11,background:"transparent",color:"rgba(255,255,255,.4)"}},"Esci"):null
        )
      )
    ),

    // Main
    h("main",{style:{maxWidth:1060,margin:"0 auto",padding:"20px 14px 40px",flex:1,width:"100%"}},

      // LOGIN
      v==="login"&&!logged?h("div",{style:{maxWidth:380,margin:"50px auto"}},
        h("div",{className:"cd",style:{padding:28}},
          h("div",{style:{textAlign:"center",marginBottom:18}},
            h("img",{src:window.LOGO_SM,style:{width:48,height:48,margin:"0 auto 8px",display:"block"}}),
            h("h2",{style:{fontSize:18,fontWeight:700}},"Accesso Archivio")
          ),
          lE?h("div",{style:{background:"#fef2f4",border:"1px solid #d9364f",borderRadius:4,padding:"8px 12px",marginBottom:12,color:"#d9364f",fontSize:13,fontWeight:600}},lE):null,
          h(F,{l:"Utente"},h("input",{style:IS,value:lU,onChange:function(e){setLU(e.target.value)}})),
          h(F,{l:"Password"},h("input",{style:IS,type:"password",value:lP,onChange:function(e){setLP(e.target.value)},onKeyDown:function(e){if(e.key==="Enter")doLogin()}})),
          h("button",{onClick:doLogin,style:{width:"100%",padding:"10px",background:"#0066cc",color:"#fff",border:"none",borderRadius:4,fontWeight:600,fontSize:14,cursor:"pointer"}},"Accedi")
        )
      ):null,

      // SELECT SERVICE
      v==="select"?h("div",null,
        h("div",{style:{textAlign:"center",marginBottom:22}},
          h("h1",{style:{fontFamily:"Lora,serif",color:"#17324d",fontSize:22,fontWeight:700}},"Seleziona il Servizio")
        ),
        h("div",{style:{maxWidth:460,margin:"0 auto 20px"}},
          h("input",{style:IS,placeholder:"Cerca...",value:search,onChange:function(e){setSearch(e.target.value)}})
        ),
        filtered.map(function(a){return h("div",{key:a.code,style:{marginBottom:14}},
          h("div",{style:{padding:"7px 12px",background:"#003366",borderRadius:"4px 4px 0 0",color:"#c8a84c",fontWeight:700,fontSize:12}},a.code+" - "+a.name),
          h("div",{className:"cd",style:{borderRadius:"0 0 4px 4px",borderTop:"none"}},
            a.svcs.map(function(s,i){return h("button",{key:s.code,className:"svc",onClick:function(){selSvc(s)},style:{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 14px",border:"none",borderTop:i?"1px solid #e8ecf1":"none",background:"transparent",cursor:"pointer",textAlign:"left"}},
              h("span",{style:{minWidth:46,padding:"3px 6px",background:"#e8f0fe",borderRadius:3,color:"#0066cc",fontWeight:700,fontSize:11,fontFamily:"monospace",textAlign:"center"}},s.code),
              h("span",{style:{color:"#17324d",fontSize:13,flex:1}},s.name)
            )})
          )
        )})
      ):null,

      // FORM - separate tabs for STR and OPR
      v==="form"&&svc?h("div",null,
        h("button",{onClick:function(){setV("select")},style:{background:"none",border:"none",color:"#0066cc",cursor:"pointer",fontSize:13,fontWeight:600,marginBottom:10}},"< Torna"),
        h("div",{className:"cd",style:{padding:"14px 16px",marginBottom:14,borderLeft:"3px solid #c8a84c"}},
          h("div",{style:{display:"flex",alignItems:"center",gap:8}},
            h("span",{style:{padding:"3px 9px",background:"#003366",borderRadius:3,color:"#c8a84c",fontWeight:700,fontSize:12,fontFamily:"monospace"}},svc.code),
            h("h2",{style:{fontSize:15,fontWeight:700,margin:0}},svc.name)
          )
        ),
        // TABS
        h("div",{style:{display:"flex",gap:3,marginBottom:14,background:"#e8ecf1",borderRadius:4,padding:3}},
          h("button",{onClick:function(){setFt("strategic")},style:{flex:1,padding:"10px 0",borderRadius:3,border:"none",cursor:"pointer",fontWeight:700,fontSize:14,background:ft==="strategic"?"#fff":"transparent",color:ft==="strategic"?"#003366":"#5c6f82"}},"Ob. Strategico"),
          h("button",{onClick:function(){setFt("operative")},style:{flex:1,padding:"10px 0",borderRadius:3,border:"none",cursor:"pointer",fontWeight:700,fontSize:14,background:ft==="operative"?"#fff":"transparent",color:ft==="operative"?"#008758":"#5c6f82"}},"Ob. Operativo")
        ),
        h("div",{className:"cd",style:{padding:"20px 18px"}},
          h("h3",{style:{fontSize:15,fontWeight:700,color:ft==="strategic"?"#003366":"#008758",margin:"0 0 14px",paddingBottom:8,borderBottom:"2px solid "+(ft==="strategic"?"#003366":"#008758")}},ft==="strategic"?"Scheda Obiettivo Strategico":"Scheda Obiettivo Operativo"),
          ft==="strategic" ? h(SF,{d:sD,s:setSD}) : h(OF,{d:oD,s:setOD,opts:svc.obj}),
          h("button",{onClick:submit,style:{width:"100%",padding:"13px",background:"#0066cc",color:"#fff",border:"none",borderRadius:4,fontWeight:700,fontSize:15,cursor:"pointer",marginTop:16}},"Salva e Scarica PDF + Excel"),
          h("div",{style:{textAlign:"center",marginTop:5,fontSize:11,color:"#5c6f82"}},"La scheda viene archiviata e i file scaricati automaticamente")
        )
      ):null,

      // ARCHIVE
      v==="archive"&&logged?h("div",null,
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:8}},
          h("div",null,
            h("h1",{style:{fontFamily:"Lora,serif",fontSize:20,fontWeight:700,margin:0}},"Archivio & Dashboard"),
            h("p",{style:{color:"#5c6f82",fontSize:12,marginTop:2}},subs.length+" schede ("+nS+" STR, "+nO+" OPR)")
          ),
          h("div",{style:{display:"flex",gap:5}},
            subs.length>0?h("button",{onClick:function(){if(confirm("Svuotare?")){window._SUBS=[];window._saveSubs([]);setSubs([])}},style:{padding:"10px 20px",background:"#fff",color:"#d9364f",border:"1.5px solid #d9364f",borderRadius:4,fontWeight:600,cursor:"pointer"}},"Svuota"):null,
            h("button",{onClick:function(){window._exportAll()},style:{padding:"10px 20px",background:"#008758",color:"#fff",border:"none",borderRadius:4,fontWeight:600,cursor:"pointer"}},"Esporta Tutto")
          )
        ),
        h("div",{style:{borderBottom:"1px solid #d9dadb",marginBottom:14,display:"flex"}},
          h("button",{className:"tb"+(aTab==="dashboard"?" ac":""),onClick:function(){setATab("dashboard")}},"Dashboard"),
          h("button",{className:"tb"+(aTab==="list"?" ac":""),onClick:function(){setATab("list")}},"Schede ("+subs.length+")")
        ),
        aTab==="dashboard"?(subs.length?h(Dash,{subs:subs}):h("div",{className:"cd",style:{textAlign:"center",padding:40}},"Compila almeno una scheda")):null,
        // ARCHIVE LIST - uses dangerouslySetInnerHTML with native onclick
        aTab==="list"?(subs.length?h("div",{dangerouslySetInnerHTML:{__html:archiveListHTML}}):h("div",{className:"cd",style:{textAlign:"center",padding:40}},"Nessuna scheda")):null
      ):null
    ),

    // Footer
    h("footer",{style:{background:"#003366",padding:"12px 16px",textAlign:"center",color:"rgba(255,255,255,.3)",fontSize:11,borderTop:"2px solid #c8a84c"}},"Regione Molise - Piano Performance Organizzativa 2025/2027 - DGR n. 149/2025")
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));

</script></body></html>
