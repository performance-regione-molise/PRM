<style>
:root{--primary:#06c;--primary-dark:#004d99;--primary-darker:#003366;--primary-bg:#f0f6fc;--success:#008758;--success-bg:#d1e7dd;--danger:#d9364f;--danger-bg:#f8d7da;--warning:#a66300;--warning-bg:#fff3cd;--fesr:#1B4F72;--fesr-bg:#d4e6f1;--fse:#7D3C98;--fse-bg:#e8daef;--fsc:#B7950B;--fsc-bg:#fcf3cf;--text:#17324d;--text-sec:#5b6f82;--border:#d6dce3;--bg:#f5f6f7;--white:#fff;--radius:4px;--radius-lg:8px;--font:'Titillium Web',-apple-system,sans-serif;--mono:'Roboto Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:var(--font);color:var(--text);background:var(--bg);font-size:16px;line-height:1.5}.container{max-width:1320px;margin:0 auto;padding:0 24px}
.hdr-slim{background:var(--primary-darker);color:#fff;font-size:13px;padding:4px 0}.hdr-slim .container{display:flex;justify-content:space-between;align-items:center}.hdr-slim a{color:rgba(255,255,255,.8);text-decoration:none;cursor:pointer}
.hdr-center{background:var(--primary-dark);color:#fff;padding:14px 0}.hdr-center .container{display:flex;align-items:center;gap:16px}.hdr-center .logo{width:48px;height:48px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px}.hdr-center h1{font-size:20px;font-weight:700}.hdr-center .sub{font-size:13px;opacity:.7}
.hdr-nav{background:var(--primary);border-bottom:3px solid #ffc107;overflow-x:auto}.hdr-nav .container{display:flex}.hdr-nav a{display:block;padding:12px 16px;color:rgba(255,255,255,.85);text-decoration:none;font-size:13px;font-weight:600;border-bottom:3px solid transparent;margin-bottom:-3px;transition:.2s;white-space:nowrap;cursor:pointer}.hdr-nav a:hover,.hdr-nav a.active{color:#fff;background:rgba(255,255,255,.08);border-bottom-color:#ffc107}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 1px 2px rgba(0,0,0,.06);margin-bottom:20px}.card-h{padding:14px 20px;border-bottom:1px solid var(--border);background:#fafbfc;font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.card-b{padding:20px}
.callout{padding:14px 20px;border-left:4px solid var(--primary);background:var(--primary-bg);border-radius:0 var(--radius) var(--radius) 0;margin-bottom:16px;font-size:14px}.callout.warn{border-color:var(--warning);background:var(--warning-bg)}.callout.err{border-color:var(--danger);background:var(--danger-bg)}.callout.ok{border-color:var(--success);background:var(--success-bg)}.callout b{display:block;margin-bottom:4px}
table{width:100%;border-collapse:collapse;font-size:14px}thead th{background:var(--primary-darker);color:#fff;padding:10px 14px;text-align:left;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;cursor:pointer;user-select:none}thead th:hover{background:#002244}thead th .si{font-size:10px;margin-left:4px;opacity:.5}tbody td{padding:10px 14px;border-bottom:1px solid #e8ecf0;vertical-align:top}tbody tr:hover{background:#f0f6fc}
.fg{margin-bottom:14px}.fg label{display:block;font-size:14px;font-weight:600;margin-bottom:4px}.fg .req{color:var(--danger)}
input[type=text],input[type=email],input[type=number],input[type=date],select,textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius);font-family:var(--font);font-size:14px;color:var(--text);background:#fff;transition:.2s}input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(0,102,204,.15)}textarea{resize:vertical;min-height:70px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 22px;border:2px solid transparent;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:.2s;text-transform:uppercase;letter-spacing:.04em}.btn-p{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-p:hover{background:var(--primary-dark)}.btn-s{background:#e6e9f2;color:var(--text);border-color:#d0d5de}.btn-ok{background:var(--success);color:#fff;border-color:var(--success)}.btn-err{background:var(--danger);color:#fff;border-color:var(--danger)}.btn-sm{padding:6px 14px;font-size:12px}.btn-ghost{background:transparent;color:var(--primary);border-color:var(--primary);padding:6px 14px;font-size:12px}.btn-xls{background:#1D6F42;color:#fff;border-color:#1D6F42;padding:8px 16px;font-size:13px}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
.b-presentata{background:#cfe2ff;color:#084298}.b-ammissibile{background:#d1e7dd;color:#0f5132}.b-non_ammissibile{background:#f8d7da;color:#842029}.b-in_istruttoria{background:#e2d9f3;color:#432874}.b-in_graduatoria{background:#fff3cd;color:#856404}.b-da_accettare{background:#d1ecf1;color:#0c5460}.b-accettata{background:#badbcc;color:#0a3622}.b-da_cup{background:var(--warning-bg);color:var(--warning)}.b-finanziata{background:#badbcc;color:#0a3622}.b-in_pagamento{background:#b6d4fe;color:#052c65}.b-rendicontata{background:#d1ecf1;color:#0c5460}.b-chiusa{background:#e9ecf0;color:#5b6f82}.b-rinunciata{background:#f8d7da;color:#842029}.b-erogato{background:var(--success-bg);color:var(--success)}.b-in_verifica{background:var(--warning-bg);color:var(--warning)}.b-fesr{background:var(--fesr-bg);color:var(--fesr)}.b-fse{background:var(--fse-bg);color:var(--fse)}.b-fsc{background:var(--fsc-bg);color:var(--fsc)}
.prog{height:8px;background:#e9ecf0;border-radius:4px;overflow:hidden}.prog-bar{height:100%;border-radius:4px;transition:width .5s}
.row{display:flex;gap:20px;flex-wrap:wrap}.col{flex:1;min-width:0}.col-3{flex:0 0 calc(25% - 15px)}.col-4{flex:0 0 calc(33.33% - 14px)}.col-6{flex:0 0 calc(50% - 10px)}
.stat{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;border-top:3px solid var(--primary)}.stat .v{font-size:22px;font-weight:700;color:var(--primary);font-family:var(--mono)}.stat .l{font-size:11px;color:var(--text-sec);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:16px;text-align:center;cursor:pointer;transition:.2s;background:#fafbfc;position:relative}.upload-zone:hover{border-color:var(--primary);background:var(--primary-bg)}.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.doc-section{margin-bottom:10px;padding:12px;border:1px solid var(--border);border-radius:var(--radius-lg);background:#fafbfc}.doc-section.has-file{border-color:var(--success);background:var(--success-bg)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center}.modal{background:#fff;border-radius:var(--radius-lg);max-width:960px;width:95%;max-height:90vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}.modal-h{padding:14px 24px;border-bottom:1px solid var(--border);background:var(--primary-darker);color:#fff;display:flex;justify-content:space-between;align-items:center}.modal-h h3{font-size:17px;margin:0}.modal-h .close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}.modal-b{padding:24px}.modal-f{padding:12px 24px;border-top:1px solid var(--border);text-align:right;background:#fafbfc}
.footer{background:var(--primary-darker);color:rgba(255,255,255,.7);padding:32px 0;margin-top:48px;font-size:13px}.footer strong{color:#fff}
.hidden{display:none!important}.notify{position:fixed;top:80px;right:24px;z-index:9999;padding:14px 24px;border-radius:var(--radius);color:#fff;font-weight:600;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.2);animation:sIn .3s}.notify.ok{background:var(--success)}.notify.err{background:var(--danger)}@keyframes sIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.avviso-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;margin-bottom:24px}.avviso-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:.2s;display:flex;flex-direction:column;cursor:pointer}.avviso-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.sc-row{display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid #f0f2f4;font-size:13px}.sc-row label{flex:1}.sc-row select{min-width:180px}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;flex-wrap:wrap}.tabs button{padding:10px 18px;font-size:13px;font-weight:600;color:var(--text-sec);cursor:pointer;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;font-family:var(--font);transition:.2s}.tabs button:hover{color:var(--primary)}.tabs button.active{color:var(--primary);border-bottom-color:var(--primary)}
.crit-builder{border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:10px;background:#fafbfc;position:relative}
.crit-builder .del-crit{position:absolute;top:8px;right:8px;background:var(--danger);color:#fff;border:none;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
@media(max-width:768px){.row{flex-direction:column}.col-3,.col-4,.col-6{flex:0 0 100%}.avviso-grid{grid-template-columns:1fr}}
</style>

// ─── Invio PEC reale (dual: beneficiario + Regione) ───
async function dualPec(d,oggetto,pdfBlob,pdfFileName){
  const av=AVVISI.find(a=>a.id===d.avviso);
  const pecReg=av?.config?.smtp?.user||'avvisi@pec.regione.molise.it';
  const data=new Date().toISOString().slice(0,10);
  
  // Log locale sempre
  d.pec_log.push({ogg:oggetto,dest:d.email,data,stato:'inviata'});
  d.pec_log.push({ogg:oggetto+' [cc Regione]',dest:pecReg,data,stato:'inviata'});

  if(!PEC_CONFIG.SERVER_URL){
    nfy('PEC simulata (server non configurato) — '+d.email+' + '+pecReg);return}

  try{
    // Prepara PDF allegato se presente
    let pdf_base64=null;
    if(pdfBlob){
      const buf=await pdfBlob.arrayBuffer();
      pdf_base64=btoa(String.fromCharCode(...new Uint8Array(buf)))}

    const body={
      to:[d.email,pecReg],
      subject:oggetto,
      body_text:`Comunicazione relativa alla domanda ${d.id} — ${d.company}\n\nAvviso: ${av?.titolo||d.avviso}\n\n${oggetto}\n\nRegione Molise — MoliseAvvisi21-27`,
      pdf_base64:pdf_base64,
      pdf_filename:pdfFileName||null
    };

    const r=await fetch(PEC_CONFIG.SERVER_URL+'/api/pec/send-with-pdf',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)});
    const j=await r.json();
    
    if(j.ok){
      d.pec_log[d.pec_log.length-1].messageId=j.messageId;
      d.pec_log[d.pec_log.length-2].messageId=j.messageId;
      nfy('✅ PEC REALE inviata — '+d.email+' + '+pecReg)}
    else{nfy('PEC errore: '+j.error,'err')}
  }catch(e){nfy('PEC server non raggiungibile — simulata','err')}}

// Genera PDF senza aprirlo (per allegare a PEC)
function generaPDFperTipo(domId,tipo){
  const d=DB.applications.find(x=>x.id===domId);const av=AVVISI.find(a=>a.id===d.avviso);
  const eg=getEnte(av?.ente_gestore);const fondo=FN[d.fondo];
  const rupNome=rupN(d.rup_aggiudicazione?.cf||av?.config?.rup);
  const base={avviso:av?.id+' — '+av?.titolo,domanda:d.id,beneficiario:d.company,piva:d.piva,email:d.email,importo:fE(d.importo),contributo:fE(d.contributo),ente_logo:eg?.logo||'',ente_nome:eg?.nome||'',fondo:fondo?.l,os:av?.os,rup_nome:rupNome,firma_data:new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'})};
  try{
    switch(tipo){
      case 'ammissibilita':return generaPDF({...base,titolo:'VERBALE DI AMMISSIBILITA\'',corpo_sections:[{testo:'Domanda '+d.id+' di '+d.company+' ammessa a istruttoria.'},{titolo:'Checklist',tabella:[['Requisito','Esito'],...(av?.config?.fasi_checklist||[]).flatMap(f=>f.items.map(it=>[it,'Conforme']))]}],esito:'AMMESSA',esito_ok:true});
      case 'non_ammissibilita':return generaPDF({...base,titolo:'VERBALE DI NON AMMISSIBILITA\'',corpo_sections:[{testo:'Domanda '+d.id+' di '+d.company+' non ammissibile.'+(d.verbali?.find(v=>v.motivazioni)?'\n\nMotivazioni: '+d.verbali.find(v=>v.motivazioni).motivazioni:'')}],esito:'NON AMMISSIBILE',esito_ok:false});
      case 'scoring':const sc=d.istruttoria?.scoring;return generaPDF({...base,titolo:'VERBALE VALUTAZIONE',sottotitolo:d.score+'/100',corpo_sections:[{titolo:'Punteggi',tabella:[['Criterio','Punti','Max'],...(av?.config?.criteri_scoring||[]).map(c=>[c.nome,String(sc?.dettaglio?.[c.id]||0),String(c.max)]),['TOTALE',String(d.score),'100']]}],esito:d.score>=(av?.config?.soglia||60)?'IN GRADUATORIA':'SOTTO SOGLIA',esito_ok:d.score>=(av?.config?.soglia||60)});
      case 'graduatoria_ammesso':return generaPDF({...base,titolo:'AMMISSIONE A FINANZIAMENTO',corpo_sections:[{testo:'La domanda '+d.id+' risulta finanziabile. Contributo: '+fE(d.contributo)}],esito:'FINANZIABILE',esito_ok:true});
      case 'graduatoria_non_finanziabile':return generaPDF({...base,titolo:'NON FINANZIABILITA\'',corpo_sections:[{testo:'Domanda '+d.id+' non finanziabile per esaurimento budget. Punteggio: '+d.score+'/100'}],esito:'NON FINANZIABILE',esito_ok:false});
      case 'graduatoria_chiusura':
      const gradDoms=DB.applications.filter(x=>x.avviso===d.avviso&&x.score).sort((a,b)=>b.score-a.score);
      const gradRows=[['#','ID','Richiedente','Score','Contributo','Esito']];
      gradDoms.forEach((gd,gi)=>{const isFin=['finanziata','in_pagamento','rendicontata','da_accettare','da_cup'].includes(gd.status);const isRin=gd.status==='rinunciata';
        gradRows.push([String(gi+1),gd.id,gd.company,String(gd.score),fE(gd.contributo),isRin?'RINUNCIA':isFin?'FINANZIATO':'NON FINANZ.'])});
      pdf=generaPDF({...base,titolo:'VERBALE DI CHIUSURA GRADUATORIA',sottotitolo:'Graduatoria definitiva — Avviso '+av?.id,
        corpo_sections:[{testo:'Completata la valutazione di tutte le domande pervenute per l\'Avviso '+av?.titolo+' ('+av?.id+'), si procede alla chiusura della graduatoria definitiva.\n\nDotazione: '+fE(av?.dotazione||0)},{titolo:'Graduatoria',tabella:gradRows}],
        esito:'GRADUATORIA APPROVATA',esito_ok:true});break;
    case 'assegnazione_cup':return generaPDF({...base,titolo:'ASSEGNAZIONE CUP',corpo_sections:[{testo:'CUP assegnato: '+(d.cup||'')+'\nRUP Esecuzione: '+(d.rup_esecuzione?.cf?rupN(d.rup_esecuzione.cf):'—')}],esito:'CUP ASSEGNATO',esito_ok:true});
      case 'revoca_cup':return generaPDF({...base,titolo:'REVOCA CUP',corpo_sections:[{testo:'Revocato CUP '+(d.cup||'')+'. Disimpegno: '+fE(d.contributo)}],esito:'REVOCATO',esito_ok:false});
      case 'scorrimento_graduatoria':return generaPDF({...base,titolo:'SCORRIMENTO GRADUATORIA',corpo_sections:[{testo:'Ammesso a finanziamento per scorrimento. Contributo: '+fE(d.contributo)}],esito:'AMMESSO PER SCORRIMENTO',esito_ok:true});
      case 'rinuncia_finanziamento':return generaPDF({...base,titolo:'DECADENZA/RINUNCIA',corpo_sections:[{testo:'Decaduta dal finanziamento. Quota '+fE(d.contributo)+' disimpegnata.'}],esito:'DECADUTA',esito_ok:false});
      default:return null;
    }
  }catch(e){console.error('PDF gen:',e);return null}}

function makeSortable(tid){setTimeout(()=>{const t=$$(tid);if(!t)return;t.querySelectorAll('thead th').forEach((th,i)=>{th.innerHTML+='<span class="si">⇅</span>';th.onclick=()=>{const tb=t.querySelector('tbody');const rows=[...tb.querySelectorAll('tr')];const k=tid+'_'+i;const asc=!th._asc;th._asc=asc;th.querySelector('.si').textContent=asc?'↑':'↓';rows.sort((a,b)=>{const ca=a.cells[i]?.textContent?.trim()||'',cb=b.cells[i]?.textContent?.trim()||'';const na=parseFloat(ca.replace(/[€.,\s%]/g,'')),nb=parseFloat(cb.replace(/[€.,\s%]/g,''));if(!isNaN(na)&&!isNaN(nb))return asc?na-nb:nb-na;return asc?ca.localeCompare(cb,'it'):cb.localeCompare(ca,'it')});rows.forEach(r=>tb.appendChild(r))}})},50)}

function generaSilPkg(dom,renId){
  const av=AVVISI.find(a=>a.id===dom.avviso);const ren=dom.rendicontazione.find(r=>r.id===renId);
  const isFirst=!dom.rendicontazione.some(r=>r.sil&&r.id!==renId);
  const pkg={_meta:{sistema:"MoliseAvvisi21-27",generato:new Date().toISOString(),cup:dom.cup,domanda:dom.id},strutture:{}};
  if(isFirst){
    pkg.strutture.AP00={CUP:dom.cup,TITOLO:dom.campi?.titolo_progetto||dom.company,BENEFICIARIO:dom.company,PIVA:dom.piva,COSTO_AMMESSO:dom.importo,FINANZ_PUBBLICO:dom.contributo,STATO:"In attuazione"};
    pkg.strutture.AP05={REGIONE:"14 Molise",COMUNE:dom.campi?.comune||"Molise"};
    pkg.strutture.SC00={CF_BENEFICIARIO:dom.piva,DENOMINAZIONE:dom.company,PEC:dom.email,RUOLO:"Beneficiario"};
    pkg.strutture.FN00={COSTO_PROGRAMMATO:dom.contributo,ANNO:new Date().getFullYear()};
    pkg.strutture.IN06=[{INDICATORE:"RCO02",DESCRIZIONE:"Imprese sostenute",VALORE:1}];
  }
  const totPagato=dom.pagamenti.filter(p=>p.stato==='erogato').reduce((s,p)=>s+p.importo,0);
  pkg.strutture.FN01={IMPEGNI_GIURIDICI:dom.contributo,TOTALE_PAGATO:totPagato,IMPORTO_RENDICONTATO:ren?.rend||0,IMPORTO_VALIDATO:ren?.valid||0};
  pkg.strutture.IP00=[{STEP:"CONCESSIONE",DATA:dom.verbali?.find(v=>v.tipo==='graduatoria')?.data||''},{STEP:"RENDICONTO",DATA:ren?.data||''}];
  return pkg;
}

// GENERAZIONE PDF REALI — jsPDF (stile PA istituzionale)
// Genera PDF veri, li mostra, li salva su Google Drive
// ═══════════════════════════════════════════════════════════════
function generaPDF(opts){
  const {jsPDF}=window.jspdf;
  // opts: {titolo, sottotitolo, avviso, domanda, beneficiario, piva, email, importo, contributo, ente_logo, ente_nome, fondo, os, rup_nome, corpo_sections[], esito, esito_ok, firma_data}
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,H=297,M=20,CW=W-2*M;let y=M;

  // Header PA istituzionale
  doc.setFillColor(0,51,102);doc.rect(0,0,W,36,'F');
  doc.setFillColor(255,193,7);doc.rect(0,36,W,2.5,'F');
  // Logo placeholder (stemma)
  doc.setFillColor(192,57,43);doc.roundedRect(M,4,18,22,2,2,'F');
  doc.setDrawColor(255);doc.setLineWidth(.8);doc.line(M+3,22,M+15,6);
  doc.setFillColor(255);doc.circle(M+7,10,2,'F');
  // Intestazione
  doc.setFontSize(13);doc.setTextColor(255);doc.setFont(undefined,'bold');
  doc.text('REGIONE MOLISE',M+22,13);
  doc.setFontSize(8.5);doc.setFont(undefined,'normal');
  doc.text('Giunta Regionale — Servizio Sistemi Informativi e Transizione al Digitale',M+22,19);
  // Soggetti esecutori
  if(opts.ente_nome&&opts.ente_nome!=='Regione Molise'){
    doc.setFontSize(8);doc.text('Soggetto esecutore: '+opts.ente_nome,M+22,25)}
  // Fondo badge
  doc.setFontSize(7.5);doc.setTextColor(255,193,7);
  doc.text((opts.fondo||'')+' — '+(opts.os||''),M+22,31);
  // Protocollo
  doc.setFontSize(7);doc.setTextColor(200);
  doc.text('Prot. n. '+new Date().getTime().toString().substring(0,10)+'/'+new Date().getFullYear(),W-M-40,31);
  y=46;

  // Title
  doc.setFontSize(16);doc.setTextColor(0,51,102);
  doc.text(opts.titolo||'VERBALE',W/2,y,{align:'center'});y+=8;
  if(opts.sottotitolo){doc.setFontSize(10);doc.setTextColor(91,111,130);doc.text(opts.sottotitolo,W/2,y,{align:'center'});y+=8}
  y+=4;

  // Info box
  doc.setDrawColor(214,220,227);doc.setFillColor(250,251,252);doc.roundedRect(M,y,CW,36,2,2,'FD');
  doc.setFontSize(9);doc.setTextColor(23,50,77);
  const info=[['Avviso',opts.avviso||''],['Domanda',opts.domanda||''],['Richiedente',opts.beneficiario||''],['P.IVA/CF',opts.piva||''],['PEC',opts.email||''],['Investimento',opts.importo||''],['Contributo',opts.contributo||'']];
  let ix=M+4,iy=y+5;info.forEach((r,i)=>{
    doc.setFont(undefined,'bold');doc.text(r[0]+':',ix,iy);doc.setFont(undefined,'normal');doc.text(' '+r[1],ix+28,iy);
    if(i%2===0)ix=M+CW/2+4;else{ix=M+4;iy+=5}});
  y+=42;

  // Corpo sections
  if(opts.corpo_sections){opts.corpo_sections.forEach(sec=>{
    if(y>H-50){doc.addPage();y=M}
    if(sec.titolo){doc.setFontSize(11);doc.setTextColor(0,51,102);doc.setFont(undefined,'bold');doc.text(sec.titolo,M,y);y+=2;
      doc.setDrawColor(0,77,153);doc.setLineWidth(.4);doc.line(M,y,M+CW,y);y+=5}
    doc.setFont(undefined,'normal');doc.setFontSize(9);doc.setTextColor(23,50,77);

    if(sec.testo){const lines=doc.splitTextToSize(sec.testo,CW);doc.text(lines,M,y);y+=lines.length*4+4}

    if(sec.tabella){const t=sec.tabella;// [[header],[rows...]]
      const colW=CW/t[0].length;
      // header
      doc.setFillColor(0,51,102);doc.rect(M,y-1,CW,6,'F');doc.setTextColor(255);doc.setFontSize(8);doc.setFont(undefined,'bold');
      t[0].forEach((c,ci)=>doc.text(c,M+ci*colW+2,y+3));y+=7;
      doc.setTextColor(23,50,77);doc.setFont(undefined,'normal');
      for(let ri=1;ri<t.length;ri++){if(y>H-30){doc.addPage();y=M}
        if(ri%2===0){doc.setFillColor(240,246,252);doc.rect(M,y-3,CW,5,'F')}
        t[ri].forEach((c,ci)=>doc.text(String(c),M+ci*colW+2,y));y+=5}
      y+=4}
  })}

  // Esito box
  if(opts.esito){y+=4;
    doc.setFillColor(...(opts.esito_ok?[209,231,221]:[248,215,218]));
    doc.roundedRect(M,y,CW,14,2,2,'F');
    doc.setFontSize(13);doc.setTextColor(...(opts.esito_ok?[15,81,50]:[132,32,41]));doc.setFont(undefined,'bold');
    doc.text('ESITO: '+opts.esito,W/2,y+9,{align:'center'});y+=22}

  // Firma
  if(y>H-40){doc.addPage();y=M}
  y=Math.max(y,H-55);
  doc.setFontSize(9);doc.setTextColor(91,111,130);doc.setFont(undefined,'normal');
  doc.text('Luogo e data',M,y);doc.text('Il Responsabile del Procedimento',W-M-60,y);y+=8;
  doc.setDrawColor(23,50,77);doc.line(M,y,M+50,y);doc.line(W-M-60,y,W-M,y);y+=4;
  doc.setTextColor(23,50,77);doc.setFont(undefined,'bold');
  doc.text('Campobasso, '+(opts.firma_data||new Date().toLocaleDateString('it-IT')),M,y);
  doc.text(opts.rup_nome||'',W-M-60,y);y+=4;
  doc.setFont(undefined,'normal');doc.setFontSize(8);doc.setTextColor(91,111,130);
  doc.text('Firmato digitalmente (Aruba ASSR — FEQ PADES)',W-M-60,y);

  // Footer
  doc.setFontSize(7);doc.setTextColor(160);
  doc.text(opts.ente_nome+' — '+opts.avviso+' — Generato da MoliseAvvisi21-27',W/2,H-8,{align:'center'});

  return doc}

// Helper: genera PDF verbale per tipo, lo apre e lo salva su GDrive
async function creaVerbalePDF(domId,tipo,extraData){
  const d=DB.applications.find(x=>x.id===domId);const av=AVVISI.find(a=>a.id===d.avviso);
  const eg=ENTI_GESTORI.find(x=>x.id===av?.ente_gestore);const fondo=FN[d.fondo];
  const rupNome=rupN(d.rup_aggiudicazione?.cf||av?.config?.rup);
  const base={avviso:av?.id+' — '+av?.titolo,domanda:d.id,beneficiario:d.company,piva:d.piva,email:d.email,importo:fE(d.importo),contributo:fE(d.contributo),ente_logo:eg?.logo||'',ente_nome:eg?.nome||'Regione Molise',fondo:fondo?.l,os:av?.os,rup_nome:rupNome,firma_data:new Date().toLocaleDateString('it-IT',{day:'2-digit',month:'long',year:'numeric'})};

  let pdf;const fileName='Verbale_'+tipo+'_'+d.id+'.pdf';
  switch(tipo){

      pdf=generaPDF({...base,titolo:'VERBALE DI AMMISSIBILITA\'',sottotitolo:'Verifica requisiti formali e sostanziali',
        corpo_sections:[
          {testo:'Il sottoscritto RUP, verificata la documentazione pervenuta per la domanda '+d.id+' presentata da '+d.company+' in data '+fD(d.submittedAt)+', ha proceduto alla verifica dei requisiti.'},
          {titolo:'Checklist verifiche',tabella:[['Requisito','Esito'],...(av?.config?.fasi_checklist||[]).flatMap(f=>f.items.map(it=>[it,'✓ Conforme']))]},
        ],esito:'AMMESSA A ISTRUTTORIA',esito_ok:true});break;
    case 'non_ammissibilita':
      pdf=generaPDF({...base,titolo:'VERBALE DI NON AMMISSIBILITA\'',
        corpo_sections:[{testo:'La domanda '+d.id+' di '+d.company+' NON soddisfa i requisiti previsti dall\'Avviso. La domanda e\' pertanto dichiarata non ammissibile.'}],
        esito:'NON AMMISSIBILE',esito_ok:false});break;
    case 'scoring':
      const sc=d.istruttoria?.scoring;const criteri=av?.config?.criteri_scoring||[];
      pdf=generaPDF({...base,titolo:'VERBALE DI VALUTAZIONE DI MERITO',sottotitolo:'Punteggio: '+d.score+'/100 — Soglia: '+(av?.config?.soglia||60),
        corpo_sections:[
          {testo:'La Commissione di Valutazione ha esaminato la domanda '+d.id+' di '+d.company+'.'},
          {titolo:'Punteggi attribuiti',tabella:[['Criterio','Punteggio','Max'],...criteri.map(c=>[c.nome,String(sc?.dettaglio?.[c.id]||0),String(c.max)]),['TOTALE',String(d.score),'100']]},
          {testo:'Soglia minima: '+(av?.config?.soglia||60)+'/100\nEsito: '+(d.score>=(av?.config?.soglia||60)?'Sopra soglia — In graduatoria':'Sotto soglia — Non ammissibile')},
        ],esito:d.score>=(av?.config?.soglia||60)?'IN GRADUATORIA':'SOTTO SOGLIA',esito_ok:d.score>=(av?.config?.soglia||60)});break;
    case 'graduatoria_ammesso':
      pdf=generaPDF({...base,titolo:'COMUNICAZIONE DI AMMISSIONE A FINANZIAMENTO',sottotitolo:'Posizione in graduatoria: '+(d.graduatoria_pos||'—'),
        corpo_sections:[{testo:'A seguito della chiusura della graduatoria definitiva dell\'Avviso '+av?.titolo+', la domanda '+d.id+' di '+d.company+' risulta FINANZIABILE.\n\nContributo concesso: '+fE(d.contributo)+'\n\nIl beneficiario e\' tenuto ad accettare il finanziamento entro i termini previsti dall\'Avviso, pena lo scorrimento della graduatoria.'}],
        esito:'AMMESSA A FINANZIAMENTO',esito_ok:true});break;
    case 'graduatoria_non_finanziabile':
      pdf=generaPDF({...base,titolo:'COMUNICAZIONE DI NON FINANZIABILITA\'',
        corpo_sections:[{testo:'La domanda '+d.id+' di '+d.company+', pur avendo superato la soglia minima con punteggio '+d.score+'/100, risulta NON FINANZIABILE per esaurimento della dotazione finanziaria dell\'Avviso.'}],
        esito:'NON FINANZIABILE (budget esaurito)',esito_ok:false});break;
    case 'scorrimento_graduatoria':
      pdf=generaPDF({...base,titolo:'COMUNICAZIONE SCORRIMENTO GRADUATORIA',
        corpo_sections:[{testo:'A seguito della rinuncia di un beneficiario in posizione superiore, la domanda '+d.id+' di '+d.company+' risulta FINANZIABILE per scorrimento della graduatoria.\n\nContributo: '+fE(d.contributo)}],
        esito:'AMMESSA PER SCORRIMENTO',esito_ok:true});break;
    case 'rinuncia_finanziamento':
      pdf=generaPDF({...base,titolo:'COMUNICAZIONE DI DECADENZA/RINUNCIA',
        corpo_sections:[{testo:'Si comunica che la domanda '+d.id+' di '+d.company+' risulta DECADUTA dal diritto al finanziamento a seguito di rinuncia o mancata accettazione nei termini previsti.\n\nLa quota economica di '+fE(d.contributo)+' viene disimpegnata e resa disponibile per eventuale scorrimento della graduatoria.'}],
        esito:'DECADUTA — RINUNCIA/SCADENZA',esito_ok:false});break;
    case 'graduatoria_chiusura':
      const gradDoms=DB.applications.filter(x=>x.avviso===d.avviso&&x.score).sort((a,b)=>b.score-a.score);
      const gradRows=[['#','ID','Richiedente','Score','Contributo','Esito']];
      gradDoms.forEach((gd,gi)=>{const isFin=['finanziata','in_pagamento','rendicontata','da_accettare','da_cup'].includes(gd.status);const isRin=gd.status==='rinunciata';
        gradRows.push([String(gi+1),gd.id,gd.company,String(gd.score),fE(gd.contributo),isRin?'RINUNCIA':isFin?'FINANZIATO':'NON FINANZ.'])});
      pdf=generaPDF({...base,titolo:'VERBALE DI CHIUSURA GRADUATORIA',sottotitolo:'Graduatoria definitiva — Avviso '+av?.id,
        corpo_sections:[{testo:'Completata la valutazione di tutte le domande pervenute per l\'Avviso '+av?.titolo+' ('+av?.id+'), si procede alla chiusura della graduatoria definitiva.\n\nDotazione: '+fE(av?.dotazione||0)},{titolo:'Graduatoria',tabella:gradRows}],
        esito:'GRADUATORIA APPROVATA',esito_ok:true});break;
    case 'assegnazione_cup':
      pdf=generaPDF({...base,titolo:'COMUNICAZIONE ASSEGNAZIONE CUP',sottotitolo:'CUP: '+(d.cup||''),
        corpo_sections:[{testo:'Si comunica che alla domanda '+d.id+' di '+d.company+' e\' stato assegnato il CUP '+(d.cup||'')+'.\n\nContributo: '+fE(d.contributo)+'\nRUP Esecuzione: '+(d.rup_esecuzione?.cf?rupN(d.rup_esecuzione.cf):'Da nominare')}],
        esito:'CUP ASSEGNATO',esito_ok:true});break;
    case 'revoca_cup':
      pdf=generaPDF({...base,titolo:'VERBALE DI REVOCA CUP',sottotitolo:'CUP: '+(d.cup||'N/A'),
        corpo_sections:[{testo:'Si dispone la revoca del CUP '+(d.cup||'')+' e il disimpegno della quota economica di '+fE(d.contributo)+' relativa alla domanda '+d.id+' di '+d.company+'.'}],
        esito:'CUP REVOCATO — QUOTA DISIMPEGNATA',esito_ok:false});break;
    default:
      pdf=generaPDF({...base,titolo:'VERBALE — '+tipo.toUpperCase(),corpo_sections:[{testo:extraData||''}],esito:'',esito_ok:true})
  }

  // Apri in nuova tab
  const blob=pdf.output('blob');const url=URL.createObjectURL(blob);window.open(url,'_blank');

  // Salva su Google Drive
  if(gdriveToken){
    try{
      const rootId=gdriveRootId||await trovaOCreaCartella(GDRIVE_CONFIG.ROOT_FOLDER_NAME,null);
      const avFid=await trovaOCreaCartella(av.id+'_'+(av?.titolo||'').replace(/[^a-zA-Z0-9]/g,'_').substring(0,30),rootId);
      const dFid=await trovaOCreaCartella(d.id+'_'+d.company.replace(/[^a-zA-Z0-9]/g,'_'),avFid);
      const vFid=await trovaOCreaCartella('02_Verbali',dFid);
      const meta={name:fileName,parents:[vFid]};const form=new FormData();
      form.append('metadata',new Blob([JSON.stringify(meta)],{type:'application/json'}));
      form.append('file',blob);
      await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{'Authorization':'Bearer '+gdriveToken},body:form});
      nfy('☁️ PDF salvato su Drive: '+fileName);
    }catch(e){console.error('GDrive upload:',e);nfy('PDF generato (Drive offline)','err')}
  } else {nfy('PDF generato — Connetti Drive per archiviazione')}
  return pdf}

    h+=`</tbody></table></div></div>`;setTimeout(()=>makeSortable('tP'),60)}
  h+=`<div class="card"><div class="card-h">📋 Archivio completo domande</div><div class="card-b" style="overflow-x:auto"><table id="tA"><thead><tr><th>ID</th><th>Avviso</th><th>Richiedente</th><th>Fondo</th><th>CUP</th><th>Importo</th><th>Stato</th><th>Score</th><th>RUP</th></tr></thead><tbody>`;

  // Nomina RUP specifica
  if(d.rup_aggiudicazione?.cf){h+=`<h4 style="margin-top:16px;margin-bottom:8px">👤 RUP Aggiudicazione</h4>
    <div style="padding:12px;background:var(--primary-bg);border-radius:var(--radius)"><strong>${rupN(d.rup_aggiudicazione.cf)}</strong>
    ${d.rup_aggiudicazione.determina?`<br><span style="font-size:13px">Det. nomina: <strong>${d.rup_aggiudicazione.determina.numero}</strong> del ${fD(d.rup_aggiudicazione.determina.data)}</span>`:''}

  // Log PEC

  $$('modalBox').innerHTML=`<div class="modal-bg"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>Fascicolo — ${d.id}</h3><button class="close" onclick="closeModal()">✕</button></div><div class="modal-b">${h}</div></div></div>`}

// ─── Ammissibilità (checklist → verbale + PEC) ───
function openAmm(id){const d=DB.applications.find(x=>x.id===id);const av=AVVISI.find(a=>a.id===d.avviso);if(!av?.config)return;
  const cl=av.config.fasi_checklist||[];
  let h=`<div style="margin-bottom:12px"><strong>${d.company}</strong> — ${fE(d.importo)}</div>`;
  // RUP Aggiudicazione assignment
  h+=`<div style="margin-bottom:16px;padding:14px;background:var(--primary-bg);border:1px solid var(--primary);border-radius:var(--radius-lg)">
    <strong style="color:var(--primary)">👤 RUP Aggiudicazione</strong><span style="font-size:12px;color:var(--text-sec)"> — responsabile fino ad accettazione finanziamento</span>
    <div class="row" style="margin-top:8px"><div class="col-6"><div class="fg" style="margin:0"><label style="font-size:13px">RUP</label><select id="amm_rup">${PU.filter(u=>['rup','dirigente'].includes(u.ruolo)).map(u=>`<option value="${u.cf}" ${u.cf===av.config.rup?'selected':''}>${u.nome}</option>`).join('')}</select></div></div>
    <div class="col-6"><div class="fg" style="margin:0"><label style="font-size:13px">Det. nomina</label><input type="text" id="amm_rup_det" placeholder="DET-2025-XXXX"></div></div></div></div>`;
  cl.forEach(fase=>{const ist=d.istruttoria?.[fase.id];
    h+=`<div style="margin-bottom:12px;padding:12px;border:1px solid ${ist?.done?'var(--success)':'var(--border)'};border-radius:var(--radius-lg);background:${ist?.done?'var(--success-bg)':'#fafbfc'}">
    <div style="font-weight:700;margin-bottom:6px">${fase.nome} ${ist?.done?'<span style="color:var(--success)">✓</span>':''}</div>`;
    if(!ist?.done){fase.items.forEach(it=>{h+=`<div style="padding:2px 0;font-size:13px"><label><input type="checkbox" checked> ${it}</label></div>`});
      h+=`<div style="margin-top:8px"><button class="btn btn-ok btn-sm" onclick="compAmm('${id}','${fase.id}',true)">✓ Conforme</button> <button class="btn btn-err btn-sm" onclick="compAmm('${id}','${fase.id}',false)">✕ Respingi</button></div>`}h+=`</div>`});
  $$('modalBox').innerHTML=`<div class="modal-bg"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>Ammissibilità + RUP Aggiudicazione — ${d.id}</h3><button class="close" onclick="closeModal()">✕</button></div><div class="modal-b">${h}</div></div></div>`}

function compAmm(id,fid,ok){const d=DB.applications.find(x=>x.id===id);if(!d.istruttoria)d.istruttoria={};d.istruttoria[fid]={done:true,ok,data:new Date().toISOString().slice(0,10)};
  const av=AVVISI.find(a=>a.id===d.avviso);
  // Grab RUP aggiudicazione from modal
  const rupCf=$$('amm_rup')?.value;const rupDet=$$('amm_rup_det')?.value;
  if(rupCf)d.rup_aggiudicazione={cf:rupCf,determina:rupDet?{numero:rupDet,data:new Date().toISOString().slice(0,10),file:''}:null};
  if(!ok){closeModal();richiediFirmaAruba('Verbale non ammissibilita\' — '+d.id,()=>{
    d.status='non_ammissibile';d.verbali.push({tipo:'non_ammissibilita',data:new Date().toISOString().slice(0,10),firmato:true});dualPec(d,'Non ammissibilita\' '+d.id);
    salvaDocCloud(d.avviso,d.id,'02_Verbali','Verbale_NonAmmissibilita_'+d.id+'.pdf.p7m',null);
    openVerbalePA(d.id,'non_ammissibilita')});return}
  const cl=av?.config?.fasi_checklist||[];
  if(cl.every(f=>d.istruttoria[f.id]?.done&&d.istruttoria[f.id]?.ok)){
    closeModal();richiediFirmaAruba('Verbale ammissibilita\' — '+d.id,()=>{
      d.status='ammissibile';if(!d.rup_aggiudicazione)d.rup_aggiudicazione={cf:av.config.rup,determina:null};
      d.verbali.push({tipo:'ammissibilita',data:new Date().toISOString().slice(0,10),firmato:true});
      dualPec(d,'Ammissibilita\' confermata '+d.id);
      salvaDocCloud(d.avviso,d.id,'02_Verbali','Verbale_Ammissibilita_'+d.id+'.pdf.p7m',null);
      openVerbalePA(d.id,'ammissibilita')});
  } else {nfy('Fase completata');closeModal();go('o_dom')}}

// ─── Scoring (N criteri dinamici) ───
function openSc(id){const d=DB.applications.find(x=>x.id===id);const av=AVVISI.find(a=>a.id===d.avviso);const c=av?.config;if(!c?.criteri_scoring)return;
  let h=`<div class="callout">Soglia: ${c.soglia}/100 — ${enteLogo(av.ente_gestore)} ${enteN(av.ente_gestore)}</div>`;
  c.criteri_scoring.forEach(cr=>{h+=`<div style="margin-bottom:12px"><div style="padding:8px 12px;background:var(--primary-bg);border-radius:var(--radius);font-weight:700;display:flex;justify-content:space-between"><span>${cr.nome}</span><span id="cs_${cr.id}">0/${cr.max}</span></div>`;
    cr.parametri.forEach((p,pi)=>{h+=`<div class="sc-row"><label>${p.nome} (max ${p.max})</label><select id="sp_${cr.id}_${pi}" onchange="uSc('${av.id}')"><option value="">—</option>${SCLVL.map(l=>`<option value="${(p.max*l.f).toFixed(1)}">${l.l} (${(p.max*l.f).toFixed(1)})</option>`).join('')}</select></div>`});h+=`</div>`});
  h+=`<div id="sT" style="padding:16px;background:var(--bg);border:2px solid var(--border);border-radius:var(--radius-lg);text-align:center"><div style="font-size:30px;font-weight:700">0/100</div></div>`;
  window._avSc=av.id;
  $$('modalBox').innerHTML=`<div class="modal-bg"><div class="modal" onclick="event.stopPropagation()"><div class="modal-h"><h3>Valutazione — ${d.id}</h3><button class="close" onclick="closeModal()">✕</button></div><div class="modal-b">${h}</div><div class="modal-f"><button class="btn btn-s" onclick="closeModal()">Annulla</button> <button class="btn btn-p" onclick="saveSc('${id}')">Conferma — Genera verbale + PEC</button></div></div></div>`}

function uSc(avId){const av=AVVISI.find(a=>a.id===avId);let g=0;
  av.config.criteri_scoring.forEach(cr=>{let s=0;cr.parametri.forEach((p,pi)=>{const e=$$('sp_'+cr.id+'_'+pi);if(e?.value)s+=parseFloat(e.value)});$$('cs_'+cr.id).textContent=s.toFixed(1)+'/'+cr.max;g+=s});
  const ok=g>=av.config.soglia;const e=$$('sT');if(e){e.style.borderColor=g>0?(ok?'var(--success)':'var(--danger)'):'var(--border)';e.style.background=g>0?(ok?'var(--success-bg)':'var(--danger-bg)'):'var(--bg)';e.innerHTML=`<div style="font-size:30px;font-weight:700;color:${ok?'var(--success)':'var(--danger)'}">${g.toFixed(1)}/100</div><div style="font-weight:600">${g>0?(ok?'✅ SOPRA':'❌ SOTTO'):'—'}</div>`}}

function saveSc(id){const d=DB.applications.find(x=>x.id===id);const av=AVVISI.find(a=>a.id===d.avviso);let g=0;const det={};
  av.config.criteri_scoring.forEach(cr=>{let s=0;cr.parametri.forEach((p,pi)=>{const e=$$('sp_'+cr.id+'_'+pi);if(e?.value)s+=parseFloat(e.value)});det[cr.id]=Math.round(s*10)/10;g+=s});
  d.score=Math.round(g*10)/10;d.istruttoria.scoring={done:true,tot:d.score,data:new Date().toISOString().slice(0,10),dettaglio:det};
  d.status=d.score>=av.config.soglia?(av.config.ha_graduatoria?'in_graduatoria':'da_accettare'):'non_ammissibile';
  closeModal();
  richiediFirmaAruba('Verbale valutazione merito — '+d.id+' ('+d.score+'/100)',()=>{
    d.verbali.push({tipo:'scoring',data:new Date().toISOString().slice(0,10),punteggio:d.score,firmato:true});
    dualPec(d,`Valutazione ${d.score}/100 — ${d.id}`);
    salvaDocCloud(d.avviso,d.id,'02_Verbali','Verbale_Scoring_'+d.id+'_'+d.score+'.pdf.p7m',null);
    openVerbalePA(d.id,'scoring')})}

// ─── CUP (solo dopo accettazione firmata dal beneficiario) ───
function openCup(id){const d=DB.applications.find(x=>x.id===id);
  $$('modalBox').innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:600px" onclick="event.stopPropagation()"><div class="modal-h" style="background:#e67e22"><h3>🔑 CUP + RUP Esecuzione — ${d.id}</h3><button class="close" onclick="closeModal()">✕</button></div><div class="modal-b">
    <div class="callout ok"><b>Accettazione verificata</b>${d.accettazione?.doc} firmato il ${fD(d.accettazione?.data)}</div>
    <div class="callout warn"><b>Genera CUP su cupweb.rgs.mef.gov.it e assegna il RUP Esecuzione per questo CUP</b></div>
    <div class="fg"><label>CUP (15 car.) <span class="req">*</span></label><input type="text" id="cv" maxlength="15" style="font-family:var(--mono);font-size:18px;text-transform:uppercase;text-align:center;font-weight:700;border:2px solid var(--warning)"></div>
    <h4 style="margin:16px 0 8px;border-top:1px solid var(--border);padding-top:12px">👤 RUP Esecuzione (per questo CUP)</h4>
    <div class="fg"><label>RUP Esecuzione</label><select id="cup_rup">${PU.filter(u=>['rup','dirigente','operatore'].includes(u.ruolo)).map(u=>`<option value="${u.cf}" ${u.cf===d.rup_aggiudicazione?.cf?'selected':''}>${u.nome} — ${u.ente}</option>`).join('')}</select></div>
    <div class="fg"><label>N° Determina nomina RUP Esecuzione</label><input type="text" id="cup_det" placeholder="DET-2025-XXXX"></div>
    <div class="fg"><label>Data determina</label><input type="date" id="cup_det_d"></div>
  </div><div class="modal-f"><button class="btn btn-ok" onclick="saveCup('${id}')">ASSOCIA CUP + RUP ESECUZIONE</button></div></div></div>`}
function saveCup(id){const cup=($$('cv')?.value||'').trim().toUpperCase();if(!cup||cup.length!==15){nfy('CUP non valido','err');return}
  const d=DB.applications.find(x=>x.id===id);d.cup=cup;d.status='finanziata';
  // RUP Esecuzione
  const rupCf=$$('cup_rup')?.value;const detN=$$('cup_det')?.value;
  if(rupCf){d.rup_esecuzione={cf:rupCf,determina:detN?{numero:detN,data:$$('cup_det_d')?.value||'',file:''}:null}}
  salvaDocCloud(d.avviso,d.id,'02_Verbali','Assegnazione_CUP_'+cup+'_RUP_Ese.pdf',null);
  dualPec(d,'CUP assegnato: '+cup+' — RUP Esecuzione: '+rupN(rupCf));
  creaVerbalePDF(d.id,'assegnazione_cup');
  closeModal();nfy(`CUP ${cup} → PEC + Verbale + Drive`);go('o_istr')}

/*═══════════════════════════════════════════════════════════════════
  OPERATORE: ISTRUTTORIA (graduatorie sortable)
═══════════════════════════════════════════════════════════════════*/
function pgOI(){const bandi=myB().filter(b=>b.config);let h=`<h2 style="margin-bottom:16px">Istruttoria completa</h2>`;
  bandi.forEach((av,bi)=>{const doms=DB.applications.filter(d=>d.avviso===av.id&&d.status!=='presentata'&&d.status!=='non_ammissibile');if(!doms.length)return;
    const f=FN[av.fondo];const eg=getEnte(av?.ente_gestore);const sc=av.config;
    const daScoring=doms.filter(d=>d.status==='ammissibile');
    const ranked=doms.filter(d=>d.score).sort((a,b)=>b.score-a.score);
    const inGrad=ranked.filter(d=>d.status==='in_graduatoria');
    const tuttiValutati=daScoring.length===0&&ranked.length>0;
    const daAccettare=doms.filter(d=>d.status==='da_accettare');
    const daCup=doms.filter(d=>d.status==='da_cup'&&d.accettazione?.firmata);
    let budgetUsato=0;doms.filter(d=>['finanziata','in_pagamento','rendicontata','da_accettare','accettata','da_cup'].includes(d.status)).forEach(d=>budgetUsato+=d.contributo);

    h+=`<div class="card"><div class="card-h"><span class="badge b-${f.cls}">${f.l}</span> ${av.titolo} ${eg?`<span style="font-size:12px;color:var(--text-sec);margin-left:auto">${eg.logo} ${eg.nome} — Dotazione: ${fE(av.dotazione)}</span>`:''}</div><div class="card-b">`;

    // ── Da valutare (con documenti + nomina RUP) ──
    if(daScoring.length){h+=`<div style="margin-bottom:16px;padding:12px;background:var(--warning-bg);border-radius:var(--radius-lg)"><strong style="color:var(--warning)">📊 Da valutare (${daScoring.length})</strong>`;
      daScoring.forEach(d=>{const nD=Object.keys(d.docs_caricati||{}).length;const rupDet=d.rup_aggiudicazione?.determina;
        h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.05);flex-wrap:wrap"><strong>${d.id}</strong><span>${d.company}</span><span style="font-family:var(--mono)">${fE(d.importo)}</span>
        <span style="font-size:12px;color:var(--text-sec)">${d.rup_aggiudicazione?.cf?'RUP Agg: '+rupAgg(d):''}${rupDet?' · Det. '+rupDet.numero:''}</span>
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="btn btn-ghost" onclick="viewDocs('${d.id}')">📁 ${nD}</button>
          <button class="btn btn-ghost" onclick="openNominaRup('${d.id}','aggiudicazione')" title="Modifica RUP Aggiudicazione">👤 RUP Agg.</button>
          <button class="btn btn-p btn-sm" onclick="openSc('${d.id}')">📊 Valuta</button></div></div>`});
      h+=`</div>`}

    // ── Graduatoria con budget ──
    if(ranked.length){
      h+=`<div style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px"><strong>🏆 Graduatoria — Soglia: ${sc.soglia}/100</strong>
      <span style="font-size:13px">Budget: ${fE(av.dotazione)} · Usato: <strong style="color:var(--danger)">${fE(budgetUsato)}</strong> · Residuo: <strong style="color:var(--success)">${fE(av.dotazione-budgetUsato)}</strong></span></div>
      <div class="prog" style="height:14px;margin-bottom:12px"><div class="prog-bar" style="width:${budgetUsato/av.dotazione*100}%;background:${budgetUsato>av.dotazione*.9?'var(--danger)':'var(--primary)'}"></div></div>

      ${!tuttiValutati?`<div class="callout warn" style="font-size:13px"><b>Graduatoria aperta</b>Ancora ${daScoring.length} domande da valutare. La chiusura graduatoria e la decisione di finanziamento saranno disponibili quando TUTTE le domande ammesse saranno state valutate.</div>`:''}

      <table id="tI${bi}"><thead><tr><th>#</th><th>ID</th><th>Richiedente</th><th>Documenti</th><th>Score</th><th>Contributo</th><th>Cumul.</th><th>Finanziabile</th><th>Stato</th></tr></thead><tbody>`;
      let cum=budgetUsato;
      ranked.forEach((d,i)=>{
        const isFin=['finanziata','in_pagamento','rendicontata','da_accettare','accettata','da_cup'].includes(d.status);
        const isRin=d.status==='rinunciata'||d.status==='chiusa';
        if(!isFin&&!isRin&&d.status==='in_graduatoria') cum+=d.contributo;
        const over=cum>av.dotazione;const nD=Object.keys(d.docs_caricati||{}).length;
        const rowBg=isRin?'background:#f8d7da;opacity:.7;text-decoration:line-through':isFin?'background:#d1e7dd':(over&&d.status==='in_graduatoria'?'background:var(--danger-bg)':'');
        h+=`<tr style="${rowBg}">
        <td style="font-weight:700">${i+1}°</td><td>${d.id}</td><td>${d.company}</td>
        <td><button class="btn btn-ghost" onclick="viewDocs('${d.id}')">📁${nD}</button></td>
        <td style="font-family:var(--mono);font-size:16px;font-weight:700;color:${d.score>=sc.soglia?'var(--success)':'var(--danger)'}">${d.score}</td>
        <td style="font-family:var(--mono)">${fE(d.contributo)}</td>
        <td style="font-family:var(--mono);font-size:12px;color:${over?'var(--danger)':'var(--text-sec)'}">${isRin?'—':(isFin||d.status==='in_graduatoria'?fE(cum):'—')}</td>
        <td>${isRin?'<span style="color:var(--danger);font-weight:700">↩ RINUNCIA</span>':isFin?'<span style="color:var(--success);font-weight:700">✓ FINANZIATO</span>':d.status==='in_graduatoria'?(over?'<span style="color:var(--danger);font-weight:700">✕ NON RIENTRA NEL BUDGET</span>':'<span style="color:var(--primary)">● In attesa</span>'):'—'}</td>
        <td><span class="badge b-${d.status}">${ST[d.status]||d.status}</span></td></tr>`});
      h+=`</tbody></table>`;setTimeout(()=>makeSortable('tI'+bi),100);

      // Pulsante CHIUDI GRADUATORIA (solo se tutte valutate e ci sono in_graduatoria)
      if(tuttiValutati&&inGrad.length){
        h+=`<div style="margin-top:16px;padding:16px;background:var(--primary-bg);border:2px solid var(--primary);border-radius:var(--radius-lg);text-align:center">
        <strong style="font-size:16px;color:var(--primary)">Tutte le domande sono state valutate</strong>
        <p style="font-size:13px;color:var(--text-sec);margin:8px 0">Chiudendo la graduatoria verranno finanziati i progetti in ordine di punteggio fino ad esaurimento budget. Verra' generato il verbale di chiusura graduatoria.</p>
        <button class="btn btn-p" onclick="chiudiGraduatoria('${av.id}')" style="font-size:16px;padding:14px 32px">📋 CHIUDI GRADUATORIA E GENERA VERBALE</button></div>`}
      h+=`</div>`}

    // ── Attesa accettazione ──
    if(daAccettare.length){h+=`<div style="margin-top:12px;padding:12px;background:var(--primary-bg);border-radius:var(--radius-lg)"><strong>📨 In attesa accettazione (${daAccettare.length})</strong>`;
      daAccettare.forEach(d=>{const scad=d.scadenza_accettazione;const scaduta=scad&&new Date(scad)<new Date();
        h+=`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(0,0,0,.05);flex-wrap:wrap"><span><strong>${d.id}</strong> — ${d.company} · ${fE(d.contributo)}</span>
        ${scad?`<span style="font-size:12px;color:${scaduta?'var(--danger)':'var(--text-sec)'}">Scadenza: ${fD(scad)}${scaduta?' ⚠ SCADUTA':''}</span>`:''}
        <div style="margin-left:auto;display:flex;gap:6px">
          <button class="btn btn-ghost" onclick="viewDocs('${d.id}')">📁</button>
          <button class="btn btn-err btn-sm" onclick="if(confirm('Registrare rinuncia/scadenza per ${d.id}? Scorrimento automatico graduatoria.'))rinunciaAccettazione('${d.id}')">↩ Rinuncia/Scadenza</button>
        </div></div>`});h+=`</div>`}

    // ── Da CUP ──
    if(daCup.length){h+=`<div style="margin-top:12px;padding:12px;background:var(--success-bg);border-radius:var(--radius-lg)"><strong style="color:var(--success)">🔑 Accettazione ricevuta — Generare CUP (${daCup.length})</strong>`;
      daCup.forEach(d=>{h+=`<div style="display:flex;align-items:center;gap:10px;padding:6px 0"><span>${d.id} — ${d.company}</span><span style="font-size:12px;color:var(--success)">✓ ${d.accettazione.doc}</span><button class="btn btn-ghost" onclick="viewDocs('${d.id}')">📁</button><button class="btn btn-p btn-sm" onclick="openCup('${d.id}')" style="margin-left:auto">🔑 CUP</button></div>`});h+=`</div>`}

    // Progetti con CUP assegnato (finanziati) — possibilità REVOCA
    const conCup=doms.filter(d=>d.cup&&['finanziata','in_pagamento'].includes(d.status));
    if(conCup.length){h+=`<div style="margin-top:12px;padding:12px;background:#f0f6fc;border:1px solid var(--primary);border-radius:var(--radius-lg)"><strong style="color:var(--primary)">✓ CUP Assegnati (${conCup.length})</strong>`;
      conCup.forEach(d=>{h+=`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(0,0,0,.05)"><strong>${d.id}</strong><span>${d.company}</span><span style="font-family:var(--mono);font-size:11px">${d.cup}</span><span style="font-size:12px">RUP Ese: ${d.rup_esecuzione?.cf?rupN(d.rup_esecuzione.cf):'—'}</span>
        <div style="margin-left:auto;display:flex;gap:4px"><button class="btn btn-ghost" onclick="viewDocs('${d.id}')">📁</button><button class="btn btn-ghost" onclick="openNominaRup('${d.id}','esecuzione')">👤 RUP Ese</button><button class="btn btn-err btn-sm" onclick="revocaCup('${d.id}')">⚠ Revoca</button></div></div>`});h+=`</div>`}

    h+=`</div></div>`});
  P().innerHTML=h||'<h2>Istruttoria</h2><div class="callout">Nessun bando configurato.</div>'}

// ─── CHIUDI GRADUATORIA (decide chi è finanziabile in base a budget) ───
function chiudiGraduatoria(avId){
  const av=AVVISI.find(a=>a.id===avId);const doms=DB.applications.filter(d=>d.avviso===avId&&d.status==='in_graduatoria').sort((a,b)=>b.score-a.score);
  let budget=av.dotazione;let usato=0;
  DB.applications.filter(d=>d.avviso===avId&&['finanziata','in_pagamento','rendicontata','da_accettare','accettata','da_cup'].includes(d.status)).forEach(d=>usato+=d.contributo);
  let residuo=budget-usato;const finanziabili=[];const nonFinanziabili=[];
  doms.forEach(d=>{if(residuo>=d.contributo){finanziabili.push(d);residuo-=d.contributo}else{nonFinanziabili.push(d)}});

  // Preview verbale
  const eg=getEnte(av?.ente_gestore);
  let vTesto=`══════════════════════════════════════════════\n`;
  vTesto+=`REGIONE MOLISE${eg?' — '+eg.nome:''}\n`;
  vTesto+=`VERBALE DI CHIUSURA GRADUATORIA\n`;
  vTesto+=`══════════════════════════════════════════════\n\n`;
  vTesto+=`Avviso: ${av.titolo} (${av.id})\nFondo: ${FN[av.fondo]?.l} · ${av.os}\nDotazione: ${fE(av.dotazione)}\nData: ${new Date().toLocaleDateString('it-IT')}\n\n`;
  vTesto+=`GRADUATORIA DEFINITIVA:\n${'─'.repeat(50)}\n`;
  finanziabili.forEach((d,i)=>{vTesto+=`${i+1}° — ${d.id} — ${d.company} — Score: ${d.score}/100 — ${fE(d.contributo)} → ✅ FINANZIABILE\n`});
  nonFinanziabili.forEach((d,i)=>{vTesto+=`${finanziabili.length+i+1}° — ${d.id} — ${d.company} — Score: ${d.score}/100 — ${fE(d.contributo)} → ❌ NON FINANZIABILE (budget)\n`});
  vTesto+=`\n${'─'.repeat(50)}\nTotale finanziati: ${finanziabili.length} · Importo: ${fE(finanziabili.reduce((s,d)=>s+d.contributo,0))}\nResiduo: ${fE(residuo)}\n\n`;
  vTesto+=`Il RUP: ${rupN(av.config.rup)}\nFirmato digitalmente`;

  $$('modalBox').innerHTML=`<div class="modal-bg"><div class="modal" onclick="event.stopPropagation()">
    <div class="modal-h"><h3>📋 Chiusura Graduatoria — ${av.titolo}</h3><button class="close" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div class="callout"><b>Riepilogo decisione</b>Finanziabili: <strong style="color:var(--success)">${finanziabili.length}</strong> · Non finanziabili: <strong style="color:var(--danger)">${nonFinanziabili.length}</strong> · Budget residuo: ${fE(residuo)}</div>
      <h4 style="margin-bottom:8px">📄 Preview Verbale di Chiusura Graduatoria</h4>
      <pre style="background:#1e293b;color:#e2e8f0;padding:16px;border-radius:var(--radius);font-family:var(--mono);font-size:12px;overflow-x:auto;max-height:350px;line-height:1.5;white-space:pre-wrap">${vTesto}</pre>
      <div class="callout warn" style="margin-top:12px"><b>Firmando questo verbale:</b>
      • ${finanziabili.length} domande riceveranno comunicazione di finanziamento via PEC
      • ${nonFinanziabili.length} domande riceveranno comunicazione di non finanziabilità via PEC
      • Il verbale sarà archiviato nel fascicolo di ogni progetto
      • I file verranno salvati localmente nella cartella del progetto</div>
    </div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeModal()">Annulla</button>
      <button class="btn btn-ghost" onclick="downloadVerbale('${avId}')">📥 Scarica verbale</button>
      <button class="btn btn-ok" onclick="confermaChiusura('${avId}')" style="font-size:14px">✍ FIRMA RUP + INVIA PEC + SALVA</button>
    </div></div></div>`}

function downloadVerbale(avId){
  const doms=DB.applications.filter(d=>d.avviso===avId&&d.score);
  if(doms.length)creaVerbalePDF(doms[0].id,'graduatoria_chiusura')}

function confermaChiusura(avId){
  closeModal();
  richiediFirmaAruba('Verbale chiusura graduatoria — '+avId,async()=>{
    const av=AVVISI.find(a=>a.id===avId);const doms=DB.applications.filter(d=>d.avviso===avId&&d.status==='in_graduatoria').sort((a,b)=>b.score-a.score);
    let residuo=av.dotazione;
    DB.applications.filter(d=>d.avviso===avId&&['finanziata','in_pagamento','rendicontata','da_accettare','accettata','da_cup'].includes(d.status)).forEach(d=>residuo-=d.contributo);
    const data=new Date().toISOString().slice(0,10);
    for(const d of doms){
      if(residuo>=d.contributo){
        d.status='da_accettare';residuo-=d.contributo;d.scadenza_accettazione=new Date(Date.now()+30*864e5).toISOString().slice(0,10);
        d.verbali.push({tipo:'graduatoria_ammesso',data,punteggio:d.score,firmato:true});
        d.pec_log.push({ogg:'Comunicazione finanziamento — Pos. graduatoria',dest:d.email,data});
        await creaVerbalePDF(d.id,'graduatoria_ammesso');
      } else {
        d.status='non_ammissibile';
        d.verbali.push({tipo:'graduatoria_non_finanziabile',data,punteggio:d.score,firmato:true});
        d.pec_log.push({ogg:'Non finanziabile per esaurimento budget',dest:d.email,data});
        await creaVerbalePDF(d.id,'graduatoria_non_finanziabile');
      }
    }
    nfy('Graduatoria chiusa — PDF verbali generati + Drive + PEC');go('o_istr')})}


/*═══════════════════════════════════════════════════════════════════
  OPERATORE: PAGAMENTI (URBI sync + sortable)
═══════════════════════════════════════════════════════════════════*/
function pgOP(){const doms=myD().filter(d=>['finanziata','in_pagamento','rendicontata'].includes(d.status));
  let h=`<h2 style="margin-bottom:16px">Pagamenti <button class="btn btn-xls" style="float:right" onclick="xlsP()">📥</button></h2>`;
  doms.forEach(d=>{const av=AVVISI.find(a=>a.id===d.avviso);const er=d.pagamenti.filter(p=>p.stato==='erogato').reduce((s,p)=>s+p.importo,0);
    h+=`<div class="card"><div class="card-h"><span class="badge b-${FN[d.fondo]?.cls}">${FN[d.fondo]?.l}</span> ${d.id} — ${d.company} <span style="font-family:var(--mono);font-size:11px;margin-left:auto">CUP ${d.cup}</span></div><div class="card-b">
    ${av?.config?`<div style="font-size:12px;color:var(--text-sec);margin-bottom:6px">Fasi: ${av.config.fasi_pag.join(' → ')}</div>`:''}
    <div class="prog" style="height:8px;margin-bottom:8px"><div class="prog-bar" style="width:${er/d.contributo*100}%;background:var(--success)"></div></div>
    <table><thead><tr><th>Fase</th><th>€</th><th>Determina</th><th>Mandato</th><th>Quietanza</th><th>URBI</th><th>Stato</th><th>Azioni</th></tr></thead><tbody>
    ${d.pagamenti.map(p=>`<tr><td style="font-weight:600;font-size:13px">${p.tipo}</td><td style="font-family:var(--mono)">${fE(p.importo)}</td><td style="font-size:12px">${p.det_n||'—'}</td><td style="font-size:12px">${p.mand_n||'—'}</td><td style="font-size:12px">${fD(p.quiet_data)}</td>
    <td>${p.urbi_sync?'<span style="color:var(--success)">⟲✓</span>':`<button class="btn btn-ghost" style="padding:2px 6px;font-size:11px" onclick="syncU('${d.id}','${p.id}')" title="API: GET /api/v1/contabilita/determine?cup=${d.cup}&n_det=${p.det_n||''}">⟲Sync</button>`}</td>
    <td><span class="badge b-${p.stato}">${p.stato}</span></td>
    <td>${p.stato==='in_verifica'?`<button class="btn btn-ok btn-sm" onclick="eroP('${d.id}','${p.id}')">✓</button>`:''} <button class="btn btn-ghost" onclick="generaPagamentoPDF('${d.id}','${p.id}').then(r=>{if(r?.blob)window.open(URL.createObjectURL(r.blob))})" title="Apri PDF pagamento">📄</button></td></tr>`).join('')}
    </tbody></table>
    ${er<d.contributo?`<button class="btn btn-p btn-sm" onclick="newP('${d.id}')" style="margin-top:8px">+ Pagamento</button>`:''}</div></div>`});
  P().innerHTML=h}

function syncU(dId,pId){const d=DB.applications.find(x=>x.id===dId);const p=d.pagamenti.find(x=>x.id===pId);
  nfy(`⟲ URBI API (on-demand): GET /api/v1/contabilita/determine?cup=${d.cup}&n_det=${p.det_n}`);
  setTimeout(async()=>{
    if(!p.mand_n)p.mand_n='MAND-'+Math.floor(Math.random()*9e3+1e3);
    if(!p.mand_data)p.mand_data=new Date().toISOString().slice(0,10);
    if(!p.quiet_data)p.quiet_data=new Date().toISOString().slice(0,10);
    p.urbi_sync=true;
    // Genera PDF pagamento reale e salva su Drive
    await generaPagamentoPDF(dId,pId);
    dualPec(d,'Pagamento '+p.tipo+' — Det.'+p.det_n+' Mand.'+p.mand_n+' Quiet.'+fD(p.quiet_data));
    nfy('URBI → PDF + PEC beneficiario + archiviato');go('o_pag')},800)}
async function eroP(dId,pId){const d=DB.applications.find(x=>x.id===dId);const p=d.pagamenti.find(x=>x.id===pId);p.stato='erogato';if(!p.quiet_data)p.quiet_data=new Date().toISOString().slice(0,10);
  await generaPagamentoPDF(dId,pId);nfy('Erogato — PDF generato e salvato su Drive');go('o_pag')}
function newP(dId){const d=DB.applications.find(x=>x.id===dId);const av=AVVISI.find(a=>a.id===d.avviso);const fasi=av?.config?.fasi_pag||['Pag'];const next=fasi[d.pagamenti.length]||'Pag';const pM=next.match(/(\d+)%/);const sug=pM?Math.round(d.contributo*parseInt(pM[1])/100):0;

function downloadSil(dId,rId){

  r.sil=true;r.sil_data=new Date().toISOString().slice(0,10);r.sil_pkg=generaSilPkg(d,rId);
  salvaDocCloud(d.avviso,d.id,'06_REGIS_SIL','SIL_'+d.cup+'_'+rId+'_'+r.sil_data+'.json',JSON.stringify(r.sil_pkg));
  nfy(`SIL → REGIS · CUP ${d.cup} · ${isFirst?'10':'2'} strutture PUC · Salvato cloud`);go('o_ren')}

function creaAv(){const t=$$('c_t')?.value;if(!t){nfy('Titolo','err');return}

  const criteri=[];

    const id=div.id.replace('crit_','');const n=$$('cc'+id+'_n')?.value;const m=parseInt($$('cc'+id+'_m')?.value)||0;const pTxt=$$('cc'+id+'_p')?.value||'';
    if(n&&m){const params=pTxt.split('\n').filter(l=>l.trim()).map(l=>{const p=l.split(':');return {nome:p[0]?.trim()||'Parametro',max:parseInt(p[1])||10}});
      criteri.push({id:'c'+(i+1),nome:n,max:m,parametri:params})}});

  const fasi_cl=[];
  const ricI=($$('cf_ric')?.value||'').split('\n').filter(l=>l.trim());if(ricI.length)fasi_cl.push({id:'ricevibilita',nome:'Ricevibilita\'',items:ricI});

  const entiTxt=($$('c_enti')?.value||'Regione Molise').split('\n').map(s=>s.trim()).filter(s=>s);

    const id='custom_'+Date.now()+'_'+i;

    ENTI_CUSTOM.push({id,nome,logo:'🏛️'});return id});
  // Handle logo files
  const logoFiles=$$('c_enti_loghi')?.files;
  if(logoFiles){for(let i=0;i<Math.min(logoFiles.length,entiIds.length);i++){
    const ente=getEnte(entiIds[i]);

    reader.onload=e=>{ente.logoUrl=e.target.result};reader.readAsDataURL(logoFiles[i])}}

  AVVISI.push({id,fondo:$$('c_f')?.value||'FESR',os:$$('c_os')?.value||'',titolo:t,desc:$$('c_desc')?.value||t,descEstesa:'',dotazione:parseFloat($$('c_d')?.value)||0,stato:$$('c_st')?.value||'bozza',apertura:$$('c_ap')?.value||'',chiusura:$$('c_ch')?.value||'',destinatari:$$('c_dest')?.value||'',ente_gestore:entiIds[0]||'reg',enti_gestori:entiIds,allegati:[],
    config:{fasi_checklist:fasi_cl,criteri_scoring:criteri,soglia:parseInt($$('cf_soglia')?.value)||60,ha_graduatoria:true,
      documenti:[{id:'domanda',label:'Domanda',obb:true,fmt:'.pdf,.p7m'}],campi:[],
      fasi_pag:($$('cf_fp')?.value||'Anticipo,Saldo').split(',').map(s=>s.trim()),
      fasi_ren:($$('cf_fr')?.value||'Rendiconto').split(',').map(s=>s.trim()),
      rup:$$('c_rup')?.value||'',
      smtp:{host:$$('cf_smtp_h')?.value||'',port:parseInt($$('cf_smtp_p')?.value)||465,user:$$('cf_smtp_u')?.value||'',from:$$('cf_smtp_f')?.value||''},

// Per attivare:
// 1. console.cloud.google.com → Crea progetto → Abilita Google Drive API
// 2. Credenziali → ID client OAuth → Applicazione web
// 3. Origini JS autorizzate: aggiungere il dominio da cui si apre il file

const GDRIVE_CONFIG={
  CLIENT_ID:'', // ← INCOLLA QUI IL TUO CLIENT ID
  ROOT_FOLDER_NAME:'MoliseAvvisi21-27',
};
let gdriveToken=null;let gdriveRootId=null;let gisLoaded=false;

function loadGIS(){
  if(gisLoaded)return Promise.resolve();
  return new Promise((res)=>{
    const s=document.createElement('script');s.src='https://accounts.google.com/gsi/client';
    s.onload=()=>{gisLoaded=true;res()};document.head.appendChild(s)})}

async function authGDrive(){
  if(!GDRIVE_CONFIG.CLIENT_ID){
    $$('modalBox').innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:600px" onclick="event.stopPropagation()">
      <div class="modal-h"><h3>☁️ Configurazione Google Drive</h3><button class="close" onclick="closeModal()">✕</button></div>
      <div class="modal-b">
        <div class="callout warn"><b>Client ID non configurato</b>Per connettere Google Drive reale devi:</div>
        <ol style="font-size:14px;line-height:2;padding-left:20px">
          <li>Vai su <a href="https://console.cloud.google.com" target="_blank" style="color:var(--primary)">console.cloud.google.com</a></li>
          <li>Crea un progetto (es. "MoliseAvvisi")</li>
          <li>API e servizi → Libreria → cerca <strong>Google Drive API</strong> → Abilita</li>
          <li>API e servizi → Credenziali → Crea credenziali → <strong>ID client OAuth</strong></li>
          <li>Tipo: <strong>Applicazione web</strong></li>
          <li>Origini JS autorizzate: aggiungi <code>${location.origin}</code></li>
          <li>Copia il Client ID e incollalo qui sotto</li>
        </ol>
        <div class="fg" style="margin-top:12px"><label>Client ID <span class="req">*</span></label>
          <input type="text" id="gdrive_cid" placeholder="xxxxxxxxxxxx.apps.googleusercontent.com" style="font-family:var(--mono);font-size:13px"></div>
      </div>
      <div class="modal-f"><button class="btn btn-s" onclick="closeModal()">Annulla</button> <button class="btn btn-p" onclick="setGdriveClientId()">Salva e Connetti</button></div>
    </div></div>`;return}

  await loadGIS();
  const tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GDRIVE_CONFIG.CLIENT_ID,
    scope:'https://www.googleapis.com/auth/drive.file',
    callback:(resp)=>{
      if(resp.access_token){gdriveToken=resp.access_token;nfy('Google Drive connesso!');creaStrutturaCartelle();go('o_dash')}
      else nfy('Errore autenticazione Google','err')}
  });tokenClient.requestAccessToken()}

function setGdriveClientId(){
  const cid=($$('gdrive_cid')?.value||'').trim();
  if(!cid||!cid.includes('apps.googleusercontent.com')){nfy('Client ID non valido','err');return}
  GDRIVE_CONFIG.CLIENT_ID=cid;closeModal();nfy('Client ID salvato');authGDrive()}

async function gdriveCall(url,opts={}){
  if(!gdriveToken)return null;
  opts.headers={...opts.headers,'Authorization':'Bearer '+gdriveToken};
  try{const r=await fetch(url,opts);return await r.json()}catch(e){console.error('GDrive:',e);return null}}

async function creaCartellaGDrive(nome,parentId){
  const body={name:nome,mimeType:'application/vnd.google-apps.folder'};
  if(parentId)body.parents=[parentId];
  const r=await gdriveCall('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  return r?.id||null}

async function trovaOCreaCartella(nome,parentId){
  const q=`name='${nome}' and mimeType='application/vnd.google-apps.folder'${parentId?" and '"+parentId+"' in parents":""}`;
  const r=await gdriveCall('https://www.googleapis.com/drive/v3/files?q='+encodeURIComponent(q)+'&fields=files(id,name)');
  if(r?.files?.length)return r.files[0].id;
  return creaCartellaGDrive(nome,parentId)}

async function creaStrutturaCartelle(){
  if(!gdriveToken){nfy('Google Drive non connesso','err');return}
  nfy('Creazione struttura cartelle...');
  gdriveRootId=await trovaOCreaCartella(GDRIVE_CONFIG.ROOT_FOLDER_NAME,null);
  for(const av of AVVISI){
    const doms=DB.applications.filter(d=>d.avviso===av.id);if(!doms.length)continue;
    const avFid=await trovaOCreaCartella(av.id+'_'+av.titolo.replace(/[^a-zA-Z0-9]/g,'_').substring(0,30),gdriveRootId);
    for(const d of doms){
      const dFid=await trovaOCreaCartella(d.id+'_'+d.company.replace(/[^a-zA-Z0-9]/g,'_'),avFid);
      for(const sub of ['01_Candidatura','02_Verbali','03_Accettazione','04_Pagamenti','05_Rendicontazione','06_REGIS_SIL']){
        await trovaOCreaCartella(sub,dFid)}}}
  nfy('Struttura cartelle Google Drive completata!')}

async function salvaDocCloud(avvisoId,domandaId,sottocartella,fileName,content){
  if(!gdriveToken){console.log('[Cloud offline]',avvisoId,domandaId,sottocartella,fileName);return}
  // Naviga la struttura
  const rootId=gdriveRootId||await trovaOCreaCartella(GDRIVE_CONFIG.ROOT_FOLDER_NAME,null);
  const av=AVVISI.find(a=>a.id===avvisoId);
  const avFid=await trovaOCreaCartella(avvisoId+'_'+(av?.titolo||'').replace(/[^a-zA-Z0-9]/g,'_').substring(0,30),rootId);
  const dFid=await trovaOCreaCartella(domandaId,avFid);
  const sFid=await trovaOCreaCartella(sottocartella,dFid);
  // Upload
  if(content){
    const blob=new Blob([content],{type:'application/json'});
    const metadata={name:fileName,parents:[sFid]};const form=new FormData();
    form.append('metadata',new Blob([JSON.stringify(metadata)],{type:'application/json'}));form.append('file',blob);
    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{'Authorization':'Bearer '+gdriveToken},body:form})}
  nfy(`☁️ ${fileName} → ${sottocartella}`)}

// ═══════════════════════════════════════════════════════════════
// GESTIONE RUP (Aggiudicazione e Esecuzione per CUP)
// ═══════════════════════════════════════════════════════════════
function openNominaRup(domId,tipo){
  tipo=tipo||'aggiudicazione';
  const d=DB.applications.find(x=>x.id===domId);const av=AVVISI.find(a=>a.id===d.avviso);
  const curr=tipo==='esecuzione'?d.rup_esecuzione:d.rup_aggiudicazione;
  const tipoLabel=tipo==='esecuzione'?'RUP Esecuzione (per CUP: '+(d.cup||'da assegnare')+')':'RUP Aggiudicazione';
  $$('modalBox').innerHTML=`<div class="modal-bg"><div class="modal" style="max-width:640px" onclick="event.stopPropagation()">
    <div class="modal-h"><h3>👤 ${tipoLabel} — ${d.id}</h3><button class="close" onclick="closeModal()">✕</button></div>
    <div class="modal-b">
      <div class="callout"><b>${d.company}</b> — ${av?.titolo||d.avviso}${d.cup?' — CUP: '+d.cup:''}</div>
      ${curr?.cf?`<div style="margin-bottom:12px;padding:10px;background:var(--primary-bg);border-radius:var(--radius)"><strong>Attuale:</strong> ${rupN(curr.cf)}${curr.determina?' — Det. '+curr.determina.numero:''}</div>`:''}
      <div class="fg"><label>${tipoLabel} <span class="req">*</span></label><select id="nr_rup">${PU.filter(u=>['rup','dirigente'].includes(u.ruolo)).map(u=>`<option value="${u.cf}" ${u.cf===curr?.cf?'selected':''}>${u.nome} — ${u.ente}</option>`).join('')}</select></div>
      <div class="fg"><label>N° Determina di nomina <span class="req">*</span></label><input type="text" id="nr_det" placeholder="DET-2025-XXXX" value="${curr?.determina?.numero||''}"></div>
      <div class="fg"><label>Data determina</label><input type="date" id="nr_data" value="${curr?.determina?.data||''}"></div>
      <div class="fg"><label>Carica determina (PDF)</label><div class="upload-zone" style="padding:12px"><input type="file" accept=".pdf" id="nr_file"><div style="font-size:13px">📄 PDF determina nomina</div></div></div>
    </div>
    <div class="modal-f"><button class="btn btn-s" onclick="closeModal()">Annulla</button> <button class="btn btn-p" onclick="salvaNominaRup('${domId}','${tipo}')">Salva</button></div>
  </div></div>`}

function salvaNominaRup(domId,tipo){
  const d=DB.applications.find(x=>x.id===domId);const det=$$('nr_det')?.value;
  if(!det){nfy('Inserire n° determina','err');return}
  const obj={cf:$$('nr_rup')?.value,determina:{numero:det,data:$$('nr_data')?.value||'',file:$$('nr_file')?.files?.[0]?.name||''}};
  if(tipo==='esecuzione')d.rup_esecuzione=obj;else d.rup_aggiudicazione=obj;
  salvaDocCloud(d.avviso,d.id,'02_Verbali','Det_Nomina_RUP_'+tipo+'_'+det+'.pdf',null);
  closeModal();nfy(`${tipo==='esecuzione'?'RUP Esecuzione':'RUP Aggiudicazione'}: ${rupN(obj.cf)} — Det. ${det}`);go('o_istr')}

// ═══════════════════════════════════════════════════════════════
// SCORRIMENTO GRADUATORIA (automatico su rinuncia/scadenza)
// ═══════════════════════════════════════════════════════════════
function rinunciaAccettazione(domId){
  const d=DB.applications.find(x=>x.id===domId);const av=AVVISI.find(a=>a.id===d.avviso);
  d.status='rinunciata';d.verbali.push({tipo:'rinuncia_finanziamento',data:new Date().toISOString().slice(0,10),firmato:true});
  // PEC comunicazione di decadenza/rinuncia
  dualPec(d,'Comunicazione di decadenza/rinuncia — '+d.id+' — '+d.company);
  creaVerbalePDF(d.id,'rinuncia_finanziamento');
  // Scorrimento: cerca il prossimo idoneo
  const stessoAvviso=DB.applications.filter(x=>x.avviso===d.avviso&&x.status==='non_ammissibile'&&x.score&&x.score>=(av?.config?.soglia||60)).sort((a,b)=>b.score-a.score);
  const finanziati=DB.applications.filter(x=>x.avviso===d.avviso&&['finanziata','in_pagamento','rendicontata','da_accettare','da_cup'].includes(x.status));
  let budgetUsato=finanziati.reduce((s,x)=>s+x.contributo,0);const residuo=av.dotazione-budgetUsato;
  const prossimo=stessoAvviso.find(x=>x.id!==d.id&&x.contributo<=residuo&&x.verbali?.some(v=>v.tipo==='graduatoria_non_finanziabile'));
  if(prossimo){
    prossimo.status='da_accettare';prossimo.scadenza_accettazione=new Date(Date.now()+30*864e5).toISOString().slice(0,10);
    prossimo.verbali.push({tipo:'scorrimento_graduatoria',data:new Date().toISOString().slice(0,10),firmato:true});
    // PEC + verbale di scorrimento al nuovo ammesso
    dualPec(prossimo,'Scorrimento graduatoria — Ammesso a finanziamento — '+prossimo.id);
    creaVerbalePDF(prossimo.id,'scorrimento_graduatoria');
    salvaDocCloud(prossimo.avviso,prossimo.id,'02_Verbali','Verbale_Scorrimento_'+prossimo.id+'.pdf',null);
    nfy(`✅ Scorrimento: ${d.id} rinuncia → ${prossimo.id} (${prossimo.company}) ammesso — Residuo: ${fE(residuo-prossimo.contributo)}`)
  } else {
    if(stessoAvviso.filter(x=>x.id!==d.id&&x.verbali?.some(v=>v.tipo==='graduatoria_non_finanziabile')).length>0){
      nfy(`⚠ Rinuncia ${d.id} — Candidati idonei presenti ma NESSUNO RIENTRA NEL BUDGET (residuo: ${fE(residuo)})`,'err')
    } else {nfy(`Rinuncia registrata per ${d.id} — Nessun candidato idoneo per scorrimento`)}
  }
  go('o_istr')}


// ─── Revoca CUP ───
function revocaCup(domId){
  if(!confirm('REVOCA CUP — Questa operazione disimpegna la quota economica. Continuare?'))return;
  const d=DB.applications.find(x=>x.id===domId);const oldCup=d.cup;
  d.status='chiusa';d.verbali.push({tipo:'revoca_cup',data:new Date().toISOString().slice(0,10),firmato:true});
  dualPec(d,'Revoca CUP '+oldCup+' — Disimpegno quota '+fE(d.contributo));
  creaVerbalePDF(d.id,'revoca_cup');
  salvaDocCloud(d.avviso,d.id,'02_Verbali','Verbale_Revoca_CUP_'+oldCup+'.pdf',null);
  nfy('CUP '+oldCup+' revocato — Quota '+fE(d.contributo)+' disimpegnata');go('o_istr')}
