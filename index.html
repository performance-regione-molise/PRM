<script>

// ════════════════════════════════════════════════
// GLOBAL DATA & STORAGE
// ════════════════════════════════════════════════
// ════════════════════════════════════════════════
// STORAGE: Cloud (Google Apps Script) + localStorage cache
// ════════════════════════════════════════════════
// ISTRUZIONI: Incolla qui sotto l'URL del tuo Google Apps Script Web App
// (vedi README per come crearlo)
window.API_URL = ""; // <── INCOLLA QUI IL TUO URL (es: "https://script.google.com/macros/s/XXXXXXX/exec")

window.SK = "ppo_molise";
window._SUBS = [];
window._syncing = false;
window._lastSync = null;

// Save: localStorage + cloud
window._save = function(s){
  window._SUBS = s;
  try{ localStorage.setItem(window.SK, JSON.stringify(s)); }catch(e){}
  // Cloud save
  if(window.API_URL){
    window._syncing = true;
    window.dispatchEvent(new Event("syncStatus"));
    fetch(window.API_URL, {
      method:"POST", mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action:"save",data:s})
    }).then(function(){
      window._syncing=false; window._lastSync=new Date();
      window.dispatchEvent(new Event("syncStatus"));
      console.log("Cloud save OK");
    }).catch(function(e){
      window._syncing=false;
      window.dispatchEvent(new Event("syncStatus"));
      console.error("Cloud save error:",e);
    });
  }
};

// Load: cloud first, fallback localStorage
window._load = function(){
  // Start with localStorage cache
  var local = [];
  var keys=["ppo_molise","ppo9","ppo8","ppo-v7","ppo-m-v6","ppo-m-v5"];
  for(var i=0;i<keys.length;i++){
    try{var d=JSON.parse(localStorage.getItem(keys[i])||"null");
      if(d&&d.length){
        if(keys[i]!=="ppo_molise") localStorage.setItem("ppo_molise",JSON.stringify(d));
        local=d; break;
      }
    }catch(e){}
  }
  // Trigger async cloud load
  if(window.API_URL){
    window._syncing=true;
    fetch(window.API_URL+"?action=load&t="+Date.now())
    .then(function(r){return r.json()})
    .then(function(cloudData){
      window._syncing=false; window._lastSync=new Date();
      if(cloudData&&Array.isArray(cloudData)&&cloudData.length>0){
        // Merge: cloud wins if it has more or newer data
        var merged = cloudData;
        // Also add any local entries not in cloud (offline additions)
        var cloudIds={};cloudData.forEach(function(e){cloudIds[e.id]=true});
        local.forEach(function(e){if(!cloudIds[e.id])merged.push(e)});
        window._SUBS=merged;
        try{localStorage.setItem("ppo_molise",JSON.stringify(merged))}catch(e){}
        window.dispatchEvent(new Event("subsChanged"));
        console.log("Cloud load OK: "+merged.length+" entries");
      } else if(local.length>0){
        // Cloud empty, push local data up
        window._save(local);
        console.log("Cloud was empty, pushed "+local.length+" local entries");
      }
      window.dispatchEvent(new Event("syncStatus"));
    }).catch(function(e){
      window._syncing=false;
      window.dispatchEvent(new Event("syncStatus"));
      console.log("Cloud load failed, using localStorage:",e);
    });
  }
  return local;
};

// Force reload from cloud
window._forceSync = function(){
  if(!window.API_URL){alert("URL API non configurato. Vedi istruzioni nel README.");return}
  window._syncing=true;
  window.dispatchEvent(new Event("syncStatus"));
  fetch(window.API_URL+"?action=load&t="+Date.now())
  .then(function(r){return r.json()})
  .then(function(d){
    window._syncing=false;window._lastSync=new Date();
    if(d&&Array.isArray(d)){

// Archive handlers
window._archivePDF=function(id){var e=window._SUBS.filter(function(s){return s.id===id})[0];if(e)try{window._mkPDF(e)}catch(err){alert("Errore PDF: "+err.message)}};
window._archiveXLS=function(id){var e=window._SUBS.filter(function(s){return s.id===id})[0];if(e)try{window._mkXLS(e)}catch(err){alert("Errore XLS: "+err.message)}};
window._archiveDel=function(id){if(!confirm("Eliminare?"))return;window._SUBS=window._SUBS.filter(function(s){return s.id!==id});window._save(window._SUBS);window.dispatchEvent(new Event("subsChanged"))};
window._exportAll=function(){

};

window._exportPerArea=function(){
  var subs=window._SUBS;if(!subs.length){alert("Nessun dato");return}
  var wb=XLSX.utils.book_new();
  var areas={};subs.forEach(function(e){if(!areas[e.areaCode])areas[e.areaCode]={name:e.areaName,strs:[],oprs:[]};if(e.type==="strategic")areas[e.areaCode].strs.push(e);else areas[e.areaCode].oprs.push(e)});
  var rows=[];Object.keys(areas).sort().forEach(function(ac){
    var a=areas[ac];var nS=a.strs.length,nO=a.oprs.length;
    var imp={};a.strs.forEach(function(e){(e.data.impatto||[]).forEach(function(i){imp[i]=(imp[i]||0)+1})});
    var trv={};a.strs.forEach(function(e){(e.data.trasversali||[]).forEach(function(t){trv[t]=(trv[t]||0)+1})});
    var rSi=a.oprs.filter(function(e){return e.data.rischio==="si"}).length;
    rows.push({Area:ac,Nome_Area:a.name,Tot_STR:nS,Tot_OPR:nO,Totale:nS+nO,
      Impatti:Object.keys(imp).map(function(k){return k+"("+imp[k]+")"}).join(", "),
      Trasversali:Object.keys(trv).map(function(k){return k+"("+trv[k]+")"}).join(", "),
      Rischio_Si:rSi,Rischio_Perc:nO?Math.round(rSi/nO*100)+"%":"--"
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),"Riepilogo per Area");
  // Detail sheets per area
  Object.keys(areas).sort().forEach(function(ac){
    var a=areas[ac];var det=a.strs.concat(a.oprs).map(function(e){var d=e.data;return{
      Tipo:e.type==="strategic"?"STR":"OPR",Servizio:e.serviceCode,Codice:d.codice,Descrizione:d.nome,Peso:d.peso+"%",
      Indicatore:d.indicatore,UM:d.um,Baseline:d.baseline,Fonte:d.fonte
    }});
    if(det.length)XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(det),ac.substring(0,31));
  });
  XLSX.writeFile(wb,"Indicatori_per_Area_"+new Date().toISOString().slice(0,10)+".xlsx");
};
window._exportPerServizio=function(){
  var subs=window._SUBS;if(!subs.length){alert("Nessun dato");return}
  var wb=XLSX.utils.book_new();
  var svcs={};subs.forEach(function(e){if(!svcs[e.serviceCode])svcs[e.serviceCode]={name:e.serviceName,area:e.areaCode,strs:[],oprs:[]};if(e.type==="strategic")svcs[e.serviceCode].strs.push(e);else svcs[e.serviceCode].oprs.push(e)});
  var rows=[];Object.keys(svcs).sort().forEach(function(sc){

      Indicatori_OPR:sv.oprs.map(function(e){return(e.data.codice||"")+": "+(e.data.indicatore||"-")}).join(" | ")
    });

// ═══ DASHBOARD BI COMPLETA ═══
function Dash(p){
  var s=p.subs;
  var strs=s.filter(function(x){return x.type==="strategic"});
  var oprs=s.filter(function(x){return x.type==="operative"});
  var nS=strs.length,nO=oprs.length;

  // Aggregazioni
  var ac={};s.forEach(function(x){ac[x.areaCode]=(ac[x.areaCode]||0)+1});
  var sc={};s.forEach(function(x){sc[x.serviceCode]=(sc[x.serviceCode]||0)+1});
  var allSvc=[];window.AREAS.forEach(function(a){a.svcs.forEach(function(x){allSvc.push(x.code)})});
  var covSet={};s.forEach(function(x){covSet[x.serviceCode]=true});
  var covN=Object.keys(covSet).length;
  var cvp=allSvc.length?Math.round(covN/allSvc.length*100):0;

  // Pesi medi
  var pesoS=0,cntPS=0,pesoO=0,cntPO=0;
  strs.forEach(function(x){var p=parseFloat(x.data.peso);if(!isNaN(p)){pesoS+=p;cntPS++}});
  oprs.forEach(function(x){var p=parseFloat(x.data.peso);if(!isNaN(p)){pesoO+=p;cntPO++}});

  // Impatto STR (da OVP)
  var impC={};window.IMP_STR.forEach(function(i){impC[i]=0});
  strs.forEach(function(x){(x.data.impatto||[]).forEach(function(i){if(impC[i]!==undefined)impC[i]++})});
  // Specifico STR
  var specC={};window.SPEC_STR.forEach(function(i){specC[i]=0});
  strs.forEach(function(x){(x.data.specifico||[]).forEach(function(i){if(specC[i]!==undefined)specC[i]++})});
  // Trasversali STR
  var trvC={};window.TRV.forEach(function(t){trvC[t]=0});
  strs.forEach(function(x){(x.data.trasversali||[]).forEach(function(t){if(trvC[t]!==undefined)trvC[t]++})});
  // Stakeholders (tutti)
  var stkC={};window.STK.forEach(function(t){stkC[t]=0});
  s.forEach(function(x){(x.data.stakeholders||[]).forEach(function(t){if(stkC[t]!==undefined)stkC[t]++})});
  // DEFR
  var defrSI=strs.filter(function(x){return x.data.defr==="SI"}).length;
  var defrNO=strs.filter(function(x){return x.data.defr==="NO"}).length;
  // Deadline STR
  var dlFM=strs.filter(function(x){return x.data.deadlineType==="fine_mandato"}).length;
  var dlPer=strs.filter(function(x){return x.data.deadlineType==="periodo"}).length;
  // BES
  var besC={};window.BES.forEach(function(b){besC[b]=0});
  strs.forEach(function(x){(x.data.bes||[]).forEach(function(b){if(besC[b]!==undefined)besC[b]++})});
  // Rischio OPR
  var rNo=0,rSi=0,rAlto=0,rMedio=0,rBasso=0,rTrasc=0,rND=0;
  oprs.forEach(function(x){
    if(x.data.rischio==="no")rNo++;
    else if(x.data.rischio==="si"){rSi++;var l=x.data.rischioLivello;if(l==="alto")rAlto++;else if(l==="medio")rMedio++;else if(l==="basso")rBasso++;else if(l==="trascurabile")rTrasc++;else rND++}
    else rND++;
  });
  // Natura OPR (dimensione)
  var natC={};oprs.forEach(function(x){var n=x.data.natura;if(n){var dim=n.split(" - ")[0]||n;natC[dim]=(natC[dim]||0)+1}});
  // Completezza indicatori
  var indOK=0,indMiss=0;
  s.forEach(function(x){if(x.data.indicatore&&x.data.indicatore.trim())indOK++;else indMiss++});
  var baseOK=0,baseMiss=0;
  s.forEach(function(x){if(x.data.baseline&&x.data.baseline.trim())baseOK++;else baseMiss++});
  var fonteOK=0,fonteMiss=0;
  s.forEach(function(x){if(x.data.fonte&&x.data.fonte.trim())fonteOK++;else fonteMiss++});
  // Servizi con peso completo (=100%)
  var svcWeights={};strs.forEach(function(x){svcWeights[x.serviceCode]=(svcWeights[x.serviceCode]||0)+(parseFloat(x.data.peso)||0)});
  var svcOK=0,svcKO=0;Object.keys(svcWeights).forEach(function(k){if(svcWeights[k]===100)svcOK++;else svcKO++});

  // Helpers
  var kpi=function(v,l,c,sub){return h("div",{className:"kc"},h("div",{style:{fontSize:24,fontWeight:700,color:c||"#003366"}},v),h("div",{style:{fontSize:9,color:"#5c6f82",fontWeight:600,textTransform:"uppercase"}},l),sub?h("div",{style:{fontSize:9,color:"#999",marginTop:2}},sub):null)};
  var bar=function(l,v,mx,c){var pct=mx>0?Math.round(v/mx*100):0;return h("div",{key:l,style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},h("div",{style:{width:170,fontSize:10,flexShrink:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},l),h("div",{style:{flex:1,background:"#e8ecf1",borderRadius:3,height:16,position:"relative"}},h("div",{style:{width:Math.max(pct,v>0?2:0)+"%",background:c||"#003366",borderRadius:3,height:16}}),h("span",{style:{position:"absolute",right:4,top:0,fontSize:10,fontWeight:600}},v)))};
  var sec=function(t,bg){return h("div",{style:{fontWeight:700,fontSize:12,color:bg||"#003366",marginBottom:8,paddingBottom:5,borderBottom:"2px solid "+(bg||"#003366")}},t)};
  var pct2=function(a,b){return b>0?Math.round(a/b*100)+"%":"--"};
  var tbl=function(heads,rows){return h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:10}},
    h("thead",null,h("tr",null,heads.map(function(hd,i){return h("th",{key:i,style:{padding:"4px 6px",background:"#003366",color:"#fff",textAlign:"left",fontSize:9,fontWeight:600}},hd)}))),
    h("tbody",null,rows.map(function(row,ri){return h("tr",{key:ri,style:{background:ri%2?"#f8f9fa":"#fff"}},row.map(function(cell,ci){return h("td",{key:ci,style:{padding:"3px 6px",borderBottom:"1px solid #e8ecf1"}},cell)}))})))};

  return h("div",null,
    // ── KPI ROW 1 ──
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8,marginBottom:14}},
      kpi(s.length,"Schede Totali","#003366"),
      kpi(nS,"Ob. Strategici","#0066cc"),
      kpi(nO,"Ob. Operativi","#008758"),
      kpi(covN+"/"+allSvc.length,"Servizi Coperti","#b8860b"),
      kpi(cvp+"%","Copertura",cvp>=75?"#008758":"#d9364f"),
      kpi(cntPS?Math.round(pesoS/cntPS)+"%":"--","Peso Medio STR","#5c6f82"),
      kpi(cntPO?Math.round(pesoO/cntPO)+"%":"--","Peso Medio OPR","#5c6f82")
    ),

    // ── KPI ROW 2: Completezza ──
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8,marginBottom:14}},
      kpi(pct2(indOK,s.length),"Con Indicatore",indOK===s.length?"#008758":"#d9364f",indOK+"/"+s.length),
      kpi(pct2(baseOK,s.length),"Con Baseline",baseOK===s.length?"#008758":"#d9364f",baseOK+"/"+s.length),
      kpi(pct2(fonteOK,s.length),"Con Fonte",fonteOK===s.length?"#008758":"#d9364f",fonteOK+"/"+s.length),
      kpi(svcOK+"/"+(svcOK+svcKO),"Servizi Peso=100%",svcKO===0?"#008758":"#d9364f"),
      kpi(Object.keys(ac).length+"/"+window.AREAS.length,"Aree Coperte","#b8860b")
    ),

    // ── DISTRIBUZIONE PER AREA + SERVIZIO ──
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}},
      h("div",{className:"cd",style:{padding:12}},
        sec("Distribuzione per Area"),
        Object.keys(ac).sort().map(function(k){return bar(k,ac[k],s.length,"#003366")})
      ),
      h("div",{className:"cd",style:{padding:12}},
        sec("Top Servizi"),
        Object.keys(sc).sort(function(a,b){return sc[b]-sc[a]}).slice(0,15).map(function(k){return bar(k,sc[k],Math.max.apply(null,Object.values(sc)),"#0066cc")})
      )
    ),

    // ── VALORE PUBBLICO: IMPATTO + SPECIFICO ──
    h("div",{style:{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12,marginBottom:12}},
      h("div",{className:"cd",style:{padding:12}},
        sec("Dimensioni di Impatto — Valore Pubblico (Strategici)","#0066cc"),
        nS?h("div",null,window.IMP_STR.map(function(i){return bar(i,impC[i],nS,"#0066cc")})):h("div",{style:{color:"#999",fontSize:11}},"Nessun ob. strategico")
      ),
      h("div",{className:"cd",style:{padding:12}},
        sec("Specifico (Strategici)","#0066cc"),
        nS?h("div",null,window.SPEC_STR.map(function(i){return bar(i,specC[i],nS,"#5c6f82")})):null,
        h("div",{style:{marginTop:16}}),
        sec("DEFR (Strategici)","#0066cc"),
        nS?h("div",null,
          bar("[X] Previsto nel DEFR",defrSI,nS,"#008758"),
          bar("[ ] Non previsto",defrNO,nS,"#5c6f82"),
          bar("N.D.",nS-defrSI-defrNO,nS,"#d9dadb")
        ):null,
        h("div",{style:{marginTop:16}}),
        sec("Deadline (Strategici)","#0066cc"),
        nS?h("div",null,
          bar("Entro fine mandato",dlFM,nS,"#003366"),
          bar("Periodo specifico",dlPer,nS,"#b8860b"),
          bar("Non specificato",nS-dlFM-dlPer,nS,"#d9dadb")
        ):null
      )
    ),

    // ── TRASVERSALI + STAKEHOLDERS ──
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}},
      h("div",{className:"cd",style:{padding:12}},
        sec("Obiettivi Trasversali (Strategici)","#b8860b"),
        nS?window.TRV.map(function(t){return bar(t,trvC[t],nS,"#b8860b")}):h("div",{style:{color:"#999",fontSize:11}},"--")
      ),
      h("div",{className:"cd",style:{padding:12}},
        sec("Stakeholders Coinvolti (Tutti)","#003366"),
        window.STK.map(function(t){return bar(t,stkC[t],s.length,"#003366")}),
        h("div",{style:{marginTop:16}}),
        sec("BES — Benessere Equo e Sostenibile (Strategici)","#008758"),
        nS?window.BES.map(function(b){return bar(b,besC[b],nS,"#008758")}):h("div",{style:{color:"#999",fontSize:11}},"--")
      )
    ),

    // ── RISCHIO CORRUZIONE + NATURA OPR ──
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}},
      h("div",{className:"cd",style:{padding:12}},
        sec("Rischio Corruzione (Operativi)","#d9364f"),
        nO?h("div",null,
          bar("Nessun rischio",rNo,nO,"#008758"),
          bar("Si - Rischio alto",rAlto,nO,"#d9364f"),
          bar("Si - Rischio medio",rMedio,nO,"#e67e22"),
          bar("Si - Rischio basso",rBasso,nO,"#f1c40f"),
          bar("Si - Rischio trascurabile",rTrasc,nO,"#27ae60"),
          bar("Non indicato",rND,nO,"#d9dadb")
        ):h("div",{style:{color:"#999",fontSize:11}},"--"),
        h("div",{style:{marginTop:8,fontSize:10,color:"#5c6f82"}},
          "Totale con rischio: "+rSi+" su "+nO+" ("+(nO?Math.round(rSi/nO*100):0)+"%)"
        )
      ),
      h("div",{className:"cd",style:{padding:12}},
        sec("Natura Obiettivo — Dimensione OVP (Operativi)","#008758"),
        nO?Object.keys(natC).sort(function(a,b){return natC[b]-natC[a]}).map(function(k){return bar(k,natC[k],nO,"#008758")}):h("div",{style:{color:"#999",fontSize:11}},"--"),
        h("div",{style:{marginTop:16}}),
        sec("Peso per Servizio (Strategici)","#b8860b"),
        Object.keys(svcWeights).sort().map(function(k){
          var w=svcWeights[k];var col=w===100?"#008758":w>100?"#d9364f":"#b8860b";
          return bar(k+" ("+w+"%)",w,100,col);
        })
      )
    ),

    // ── TABELLA DETTAGLIO INDICATORI STRATEGICI ──
    nS?h("div",{className:"cd",style:{padding:12,marginBottom:12}},
      sec("Dettaglio Indicatori — Obiettivi Strategici","#0066cc"),
      tbl(["Servizio","Codice","Descrizione","Peso","Impatto","Indicatore","UM","Baseline","Fonte","Deadline"],
        strs.map(function(e){var d=e.data;return[
          e.serviceCode,d.codice||"-",(d.nome||"").substring(0,40),(d.peso||"")+"%",
          (d.impatto||[]).join(", ")||"-",d.indicatore||"-",d.um||"-",d.baseline||"-",d.fonte||"-",
          d.deadlineType==="fine_mandato"?"Fine mandato":d.deadlineType==="periodo"?d.deadlinePeriodo||"Periodo":"-"
        ]}))
    ):null,

    // ── TABELLA DETTAGLIO INDICATORI OPERATIVI ──
    nO?h("div",{className:"cd",style:{padding:12,marginBottom:12}},
      sec("Dettaglio Indicatori — Obiettivi Operativi","#008758"),
      tbl(["Servizio","Codice","Descrizione","Peso","Strat.Rif","Natura","Indicatore","UM","Ris.2026","Ris.2027","Ris.2028","Rischio"],
        oprs.map(function(e){var d=e.data;return[
          e.serviceCode,d.codice||"-",(d.nome||"").substring(0,35),(d.peso||"")+"%",
          d.stratRif||"-",(d.natura||"-").substring(0,20),d.indicatore||"-",d.um||"-",
          d.ris2026||"-",d.ris2027||"-",d.ris2028||"-",d.rischio==="si"?(d.rischioLivello||"si"):"no"
        ]}))
    ):null,

    // ── DOWNLOAD EXCEL INDICATORI ──
    h("div",{className:"cd",style:{padding:12,marginBottom:12,background:"#f0f4fa",borderLeft:"3px solid #003366"}},
      sec("Scarica Excel Indicatori","#003366"),
      h("div",{style:{display:"flex",flexWrap:"wrap",gap:8}},
        h("button",{onClick:function(){window._exportIndicatoriSTR()},style:{padding:"8px 16px",background:"#0066cc",color:"#fff",border:"none",borderRadius:4,fontWeight:600,cursor:"pointer",fontSize:12}},"Indicatori Strategici (.xlsx)"),
        h("button",{onClick:function(){window._exportIndicatoriOPR()},style:{padding:"8px 16px",background:"#008758",color:"#fff",border:"none",borderRadius:4,fontWeight:600,cursor:"pointer",fontSize:12}},"Indicatori Operativi (.xlsx)"),
        h("button",{onClick:function(){window._exportPerArea()},style:{padding:"8px 16px",background:"#b8860b",color:"#fff",border:"none",borderRadius:4,fontWeight:600,cursor:"pointer",fontSize:12}},"Riepilogo per Area (.xlsx)"),
        h("button",{onClick:function(){window._exportPerServizio()},style:{padding:"8px 16px",background:"#5c6f82",color:"#fff",border:"none",borderRadius:4,fontWeight:600,cursor:"pointer",fontSize:12}},"Riepilogo per Servizio (.xlsx)"),
        h("button",{onClick:function(){window._exportAll()},style:{padding:"8px 16px",background:"#003366",color:"#fff",border:"none",borderRadius:4,fontWeight:600,cursor:"pointer",fontSize:12}},"Export Completo (.xlsx)")
      )
    ),

    // ── SPACCATO PER AREA ──
    (function(){
      var areaData={};s.forEach(function(e){
        if(!areaData[e.areaCode])areaData[e.areaCode]={name:e.areaName,strs:[],oprs:[],all:[]};
        areaData[e.areaCode].all.push(e);
        if(e.type==="strategic")areaData[e.areaCode].strs.push(e);else areaData[e.areaCode].oprs.push(e);
      });
      var aKeys=Object.keys(areaData).sort();
      if(!aKeys.length) return null;
      return h("div",{className:"cd",style:{padding:12,marginBottom:12}},
        sec("Spaccato Indicatori per Area","#003366"),
        aKeys.map(function(ak){
          var ad=areaData[ak];var ns=ad.strs.length,no=ad.oprs.length;
          // Impatto
          var impC={};ad.strs.forEach(function(e){(e.data.impatto||[]).forEach(function(i){impC[i]=(impC[i]||0)+1})});
          // Trasversali
          var trvC={};ad.strs.forEach(function(e){(e.data.trasversali||[]).forEach(function(t){trvC[t]=(trvC[t]||0)+1})});
          // Stakeholders
          var stkC2={};ad.all.forEach(function(e){(e.data.stakeholders||[]).forEach(function(t){stkC2[t]=(stkC2[t]||0)+1})});
          // Rischio
          var rSi=ad.oprs.filter(function(e){return e.data.rischio==="si"}).length;
          // Peso
          var pesoTot=0;ad.strs.forEach(function(e){pesoTot+=parseFloat(e.data.peso)||0});
          // Completezza indicatori
          var indOK2=ad.all.filter(function(e){return e.data.indicatore&&e.data.indicatore.trim()}).length;

          return h("div",{key:ak,style:{marginBottom:14,borderBottom:"1px solid #e8ecf1",paddingBottom:12}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
              h("div",{style:{fontWeight:700,fontSize:13,color:"#003366"}},ak+" - "+ad.name),
              h("div",{style:{display:"flex",gap:6}},
                h("span",{className:"tag tag-str"},"STR: "+ns),
                h("span",{className:"tag tag-opr"},"OPR: "+no),
                h("span",{style:{fontSize:10,color:indOK2===ad.all.length?"#008758":"#d9364f",fontWeight:600}},"Indicatori: "+indOK2+"/"+ad.all.length)
              )
            ),
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}},
              // Impatto
              h("div",null,
                h("div",{style:{fontSize:10,fontWeight:600,color:"#0066cc",marginBottom:3}},"Impatto (STR)"),
                Object.keys(impC).length?Object.keys(impC).map(function(k){return h("div",{key:k,style:{fontSize:9,display:"flex",justifyContent:"space-between",padding:"1px 0"}},h("span",null,k),h("span",{style:{fontWeight:700}},impC[k]))}):h("div",{style:{fontSize:9,color:"#999"}},"--")
              ),

// ═══ MAIN APP ═══
function App(){
  var _v=useState("select"),v=_v[0],setV=_v[1];
  var _svc=useState(null),svc=_svc[0],setSvc=_svc[1];
  var _sub=useState(function(){var d=window._load();window._SUBS=d;return d}),subs=_sub[0],setSubs=_sub[1];
  var _t=useState(null),toast=_t[0],setToast=_t[1];
  var _s=useState(""),search=_s[0],setSearch=_s[1];
  var _log=useState(false),logged=_log[0],setLogged=_log[1];
  var _lu=useState(""),lU=_lu[0],setLU=_lu[1];
  var _lp=useState(""),lP=_lp[0],setLP=_lp[1];
  var _le=useState(""),lE=_le[0],setLE=_le[1];
  var _at=useState("dashboard"),aTab=_at[0],setATab=_at[1];
  // Form state
  var _ft=useState("strategic"),fType=_ft[0],setFType=_ft[1];
  var _fd=useState(null),fData=_fd[0],setFData=_fd[1];
  var _fEdit=useState(null),fEditId=_fEdit[0],setFEditId=_fEdit[1];
  var _fParent=useState(null),fParentStr=_fParent[0],setFParentStr=_fParent[1];
  // User credentials
  var _cm=useState(false),credModal=_cm[0],setCM=_cm[1];
  var _an=useState(""),authName=_an[0],setAN=_an[1];
  var _ap=useState(""),authPwd=_ap[0],setAP=_ap[1];
  var _ae=useState(""),authErr=_ae[0],setAE=_ae[1];
  var _pa=useState(null),pendingAction=_pa[0],setPA=_pa[1];
  // Current session author (saved after credential check)
  var _ca=useState(""),curAuthor=_ca[0],setCA=_ca[1];
  var _ch=useState(""),curHash=_ch[0],setCH=_ch[1];

  useEffect(function(){var handler=function(){setSubs(window._SUBS.slice())};window.addEventListener("subsChanged",handler);return function(){window.removeEventListener("subsChanged",handler)}},[]);
  // Sync status
  var _sy=useState(false),syncing=_sy[0],setSyncing=_sy[1];
  useEffect(function(){var h2=function(){setSyncing(window._syncing)};window.addEventListener("syncStatus",h2);return function(){window.removeEventListener("syncStatus",h2)}},[]);
  var isCloudOK=!!window.API_URL;

  var flash=function(m,t){setToast({m:m,t:t||"ok"});setTimeout(function(){setToast(null)},3000)};

  var selSvc=function(s){setSvc(s);setV("service");window.scrollTo(0,0)};

  // Get objectives for current service
  var svcStrs=svc?subs.filter(function(s){return s.type==="strategic"&&s.serviceCode===svc.code}):[];
  var strWeightSum=0;svcStrs.forEach(function(s){strWeightSum+=parseFloat(s.data.peso)||0});

  // ── Credential flow ──
  // For NEW: ask name + password (user creates mini-account)
  var askCredNew=function(action){
    setAN("");setAP("");setAE("");setPA({action:action,mode:"new"});setCM(true);
  };
  // For EDIT: ask password only (must match stored hash)
  var askCredEdit=function(entry,action){
    setAN(entry.author||"");setAP("");setAE("");setPA({action:action,mode:"edit",entry:entry});setCM(true);
  };
  // Confirm credentials
  var confirmCred=function(){
    if(!authName.trim()){setAE("Inserisci Nome e Cognome");return}
    if(!authPwd.trim()||authPwd.length<3){setAE("Password richiesta (min 3 caratteri)");return}
    var hash=window._hash(authPwd);
    if(pendingAction.mode==="edit"){
      // Check password matches
      if(pendingAction.entry.authorHash&&pendingAction.entry.authorHash!==hash){
        setAE("Password non corretta. Solo l'autore puo modificare.");return;
      }
    }
    setCA(authName.trim());setCH(hash);setCM(false);
    // Execute pending action
    pendingAction.action(authName.trim(),hash);
  };

  // Start new STR (with credential check)
  var newStr=function(){
    askCredNew(function(name,hash){
      setFType("strategic");setFData(window.emptySTR());setFEditId(null);setFParentStr(null);setV("form");
    });
  };
  // Start new OPR linked to a strategic
  var newOpr=function(strEntry){
    askCredNew(function(name,hash){
      setFType("operative");var d=window.emptyOPR();d.stratRif=strEntry.data.codice;d.stratRifDesc=strEntry.data.nome;setFData(d);setFEditId(null);setFParentStr(strEntry.id);setV("form");
    });
  };
  // Edit existing (requires matching password)
  var editEntry=function(en){
    askCredEdit(en,function(name,hash){
      setFType(en.type);setFData(Object.assign({},en.data));setFEditId(en.id);setFParentStr(en.parentId||null);setV("form");
    });
  };

  // Save form
  var saveForm=function(){
    if(!fData||!fData.codice||!fData.nome){flash("Compila Codice e Descrizione","err");return}
    var area=window.findArea(svc.code);
    var now=new Date().toISOString();
    if(fEditId){
      // Update existing - add modification record
      var updated=subs.map(function(s){
        if(s.id===fEditId){
          var hist=(s.modifications||[]).concat([{by:curAuthor,at:now}]);
          return Object.assign({},s,{data:Object.assign({},fData),lastModifiedBy:curAuthor,lastModifiedAt:now,modifications:hist});
        }return s;
